an axis, using both forward outside and forward inside edges.", "source_page": 12, "discipline": "Skating Skills", "track": null, "levels": ["STAR 1"]}, "Forward Three-Turns": {"id": "skills_star1_forward_three_turns", "definition_en": "A set of forward three-turns in any order, covering all four: RFO, LFO, RFI, LFI.", "source_page": 12, "discipline": "Skating Skills", "track": null, "levels": ["STAR 1"]}, "Forward Inside C Step Sequence": {"id": "skills_star1_forward_inside_c_step_sequence", "definition_en": "A simple turn sequence: a forward inside C Step, then a backward outside edge on the same lobe, repeated on the other foot on the next lobe; minimum four sequences.", "source_page": 13, "discipline": "Skating Skills", "track": null, "levels": ["STAR 1"]}, "Forward Spiral Circles": {"id": "skills_star1_forward_spiral_circles", "definition_en": "A forward spiral on each edge while skating one circle, done in both directions so all four forward spirals appear.", "source_page": 13, "discipline": "Skating Skills", "track": null, "levels": ["STAR 1"]}, "Field Move of Choice": {"id": "skills_star1_field_move_of_choice", "definition_en": "The skater performs one field move chosen from the level's list (field-move definitions appear in the guide glossary).", "source_page": 14, "discipline": "Skating Skills", "track": null, "levels": ["STAR 1"]}, "STAR 1 Skills Exercise: Basic": {"id": "skills_star1_skills_exercise_basic", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 15, "discipline": "Skating Skills", "track": null, "levels": ["STAR 1"]}, "Backward Edges": {"id": "skills_star2_backward_edges", "definition_en": "At least four backward edges along an axis, using both backward outside and backward inside edges.", "source_page": 17, "discipline": "Skating Skills", "track": null, "levels": ["STAR 2"]}, "Forward Circle on Circle": {"id": "skills_star2_forward_circle_on_circle", "definition_en": "A full forward circle on one foot, then a transfer to the other foot for a second circle in the same direction; skater chooses starting foot and direction.", "source_page": 17, "discipline": "Skating Skills", "track": null, "levels": ["STAR 2"]}, "Backward Three-Turns": {"id": "skills_star2_backward_three_turns", "definition_en": "A set of backward three-turns in any order, covering all four: RBO, LBO, RBI, LBI.", "source_page": 17, "discipline": "Skating Skills", "track": null, "levels": ["STAR 2"]}, "2-Foot to 1-Foot Multi-Turns": {"id": "skills_star2_two_foot_to_one_foot_multi_turns", "definition_en": "Eight turns in sets of two on a straight line from backward skating; each pair's second turn rotates opposite the first. First two sets on two feet, last two on one foot starting on a BI edge.", "source_page": 18, "discipline": "Skating Skills", "track": null, "levels": ["STAR 2"]}, "Forward Outside Turn Sequence": {"id": "skills_star2_forward_outside_turn_sequence", "definition_en": "A simple turn sequence: a FO three-turn then a backward crosscut on the same lobe, repeated on the opposite lobe/foot; minimum four sequences.", "source_page": 18, "discipline": "Skating Skills", "track": null, "levels": ["STAR 2"]}, "STAR 3 Skills Exercise: Power": {"id": "skills_star3_skills_exercise_power", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 20, "discipline": "Skating Skills", "track": null, "levels": ["STAR 3"]}, "Forward Change of Edges": {"id": "skills_star4_forward_change_of_edges", "definition_en": "Edge changes on one foot along an axis, entry and exit edges held two seconds or more; all four performed: RFO-I, LFO-I, LFI-O, RFI-O.", "source_page": 23, "discipline": "Skating Skills", "track": null, "levels": ["STAR 4"]}, "Backward Circle on Circle": {"id": "skills_star4_backward_circle_on_circle", "definition_en": "A full backward circle on one foot, then a transfer to the other foot for a second circle in the same direction. Only one direction is assessed (draw for direction).", "source_page": 23, "discipline": "Skating Skills", "track": null, "levels": ["STAR 4"]}, "Forward Double Threes": {"id": "skills_star4_forward_double_threes", "definition_en": "Two three-turns on the same lobe from a forward one-foot glide; all four entries performed: RFO, LFO, RFI, LFI.", "source_page": 24, "discipline": "Skating Skills", "track": null, "levels": ["STAR 4"]}, "Forward Brackets": {"id": "skills_star4_forward_brackets", "definition_en": "Four forward brackets in any order: RFO, LFO, RFI, LFI.", "source_page": 24, "discipline": "Skating Skills", "track": null, "levels": ["STAR 4"]}, "Backward Brackets": {"id": "skills_star4_backward_brackets", "definition_en": "Four backward brackets in any order: RBO, LBO, RBI, LBI.", "source_page": 24, "discipline": "Skating Skills", "track": null, "levels": ["STAR 4"]}, "Spiral Sequence": {"id": "skills_star5_spiral_sequence", "definition_en": "At least two spirals on edges and different feet, with at least one unsupported; connected by any steps, turns, hops or comparable moves. Must include a qualifying spiral on each foot.", "source_page": 25, "discipline": "Skating Skills", "track": null, "levels": ["STAR 5"]}, "STAR 5 Skills Exercise 1: Quick Edges": {"id": "skills_star5_skills_exercise_1_quick_edges", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 26, "discipline": "Skating Skills", "track": null, "levels": ["STAR 5"]}, "STAR 5 Skills Exercise 2: Backward Slalom": {"id": "skills_star5_skills_exercise_2_backward_slalom", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 28, "discipline": "Skating Skills", "track": null, "levels": ["STAR 5"]}, "Backward Double Threes": {"id": "skills_star6_backward_double_threes", "definition_en": "Beginning from a backward edge, two three-turns on one lobe.", "source_page": 30, "discipline": "Skating Skills", "track": null, "levels": ["STAR 6"]}, "Forward Rockers": {"id": "skills_star6_forward_rockers", "definition_en": "A one-foot turn from outside-to-outside or inside-to-inside edge, exit curve on a different lobe, turning in the direction of the entry curve; it enters like a three-turn and exits like a bracket.", "source_page": 30, "discipline": "Skating Skills", "track": null, "levels": ["STAR 6"]}, "Backward Rockers": {"id": "skills_star6_backward_rockers", "definition_en": "A one-foot turn from outside-to-outside or inside-to-inside edge, exit curve on a different lobe, turning in the direction of the entry curve; it enters like a three-turn and exits like a bracket.", "source_page": 30, "discipline": "Skating Skills", "track": null, "levels": ["STAR 6"]}, "Forward Counters": {"id": "skills_star6_forward_counters", "definition_en": "A one-foot turn from outside-to-outside or inside-to-inside edge, exit curve on a different lobe, turning opposite the entry curve; it enters like a bracket and exits like a three-turn.", "source_page": 31, "discipline": "Skating Skills", "track": null, "levels": ["STAR 6"]}, "Backward Counters": {"id": "skills_star6_backward_counters", "definition_en": "A one-foot turn from outside-to-outside or inside-to-inside edge, exit curve on a different lobe, turning opposite the entry curve; it enters like a bracket and exits like a three-turn.", "source_page": 31, "discipline": "Skating Skills", "track": null, "levels": ["STAR 6"]}, "STAR 6 Skills Exercise: Forward Change Threes": {"id": "skills_star6_skills_exercise_forward_change_threes", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 32, "discipline": "Skating Skills", "track": null, "levels": ["STAR 6"]}, "Forward Loops": {"id": "skills_star7_forward_loops", "definition_en": "A one-foot oval skated on a single edge where entry and exit cross; the loop is clean-cut with no scrapes or points. It enters and exits in the same direction on the same edge.", "source_page": 34, "discipline": "Skating Skills", "track": null, "levels": ["STAR 7"]}, "Backward Loops": {"id": "skills_star7_backward_loops", "definition_en": "A one-foot oval skated on a single edge where entry and exit cross; the loop is clean-cut with no scrapes or points. It enters and exits in the same direction on the same edge.", "source_page": 34, "discipline": "Skating Skills", "track": null, "levels": ["STAR 7"]}, "FI S Steps": {"id": "skills_star7_fi_s_steps", "definition_en": "A step from one foot to the other where the exit edge curves opposite the entry edge (outside-to-inside or inside-to-outside). Includes Open and Closed variants; skater performs RFI and LFI Open and Closed S Steps.", "source_page": 34, "discipline": "Skating Skills", "track": null, "levels": ["STAR 7"]}, "BO S Steps": {"id": "skills_star7_bo_s_steps", "definition_en": "A backward-entry S Step: step to a BO edge, then to a FI edge on a new lobe with the free leg extending in front along the line of travel.", "source_page": 35, "discipline": "Skating Skills", "track": null, "levels": ["STAR 7"]}, "Twizzles": {"id": "skills_star7_twizzles", "definition_en": "A travelling one-foot turn of one or more revolutions that rotates quickly with a continuous, uninterrupted action. In STAR 6-Gold a twizzle needs at least two revolutions to be assessed.", "source_page": 35, "discipline": "Skating Skills", "track": null, "levels": ["STAR 7"]}, "STAR 7 Skills Exercise: Backward Change Threes": {"id": "skills_star7_skills_exercise_backward_change_threes", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 36, "discipline": "Skating Skills", "track": null, "levels": ["STAR 7"]}, "Forward Rocker - Three-Turn Sequence": {"id": "skills_star8_forward_rocker_three_turn_sequence", "definition_en": "A forward rocker (per the rocker definition) followed by a backward three-turn (per the three-turn definition).", "source_page": 38, "discipline": "Skating Skills", "track": null, "levels": ["STAR 8"]}, "Backward Rocker - Three-Turn Sequence": {"id": "skills_star8_backward_rocker_three_turn_sequence", "definition_en": "A backward rocker (per the rocker definition) followed by a forward three-turn (per the three-turn definition).", "source_page": 38, "discipline": "Skating Skills", "track": null, "levels": ["STAR 8"]}, "Forward Counter - Bracket Sequence": {"id": "skills_star8_forward_counter_bracket_sequence", "definition_en": "A forward counter (per the counter definition) followed by a backward bracket (per the bracket definition).", "source_page": 38, "discipline": "Skating Skills", "track": null, "levels": ["STAR 8"]}, "Backward Counter - Bracket Sequence": {"id": "skills_star8_backward_counter_bracket_sequence", "definition_en": "A backward counter (per the counter definition) followed by a forward bracket (per the bracket definition).", "source_page": 38, "discipline": "Skating Skills", "track": null, "levels": ["STAR 8"]}, "Two Field Moves": {"id": "skills_star8_two_field_moves", "definition_en": "Two field moves chosen from two different categories (glossary defines categories); each held at least five seconds.", "source_page": 39, "discipline": "Skating Skills", "track": null, "levels": ["STAR 8"]}, "STAR 8 Skills Exercise: Rolling Edges": {"id": "skills_star8_skills_exercise_rolling_edges", "definition_en": "An X & O pattern (large circles both directions, diagonal steps) featuring rolling edges: outside cross rolls on long, deep lobes performed forward and backward.", "source_page": 40, "discipline": "Skating Skills", "track": null, "levels": ["STAR 8"]}, "Forward Loop change Loop": {"id": "skills_star9_forward_loop_change_loop", "definition_en": "A one-foot sequence of two loops: a forward loop (per the loop definition), a change of edge, then a second forward loop.", "source_page": 42, "discipline": "Skating Skills", "track": null, "levels": ["STAR 9"]}, "Backward Loop change Loop": {"id": "skills_star9_backward_loop_change_loop", "definition_en": "A one-foot sequence of two loops: a backward loop (per the loop definition), a change of edge, then a second backward loop.", "source_page": 42, "discipline": "Skating Skills", "track": null, "levels": ["STAR 9"]}, "360 Degree Spiral Challenge": {"id": "skills_star9_360_degree_spiral_challenge", "definition_en": "An unassisted spiral position held for a full 360 degrees, covering roughly a third of the ice.", "source_page": 42, "discipline": "Skating Skills", "track": null, "levels": ["STAR 9"]}, "STAR 9 Skills Exercise 1: Rockers": {"id": "skills_star9_skills_exercise_1_rockers", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 43, "discipline": "Skating Skills", "track": null, "levels": ["STAR 9"]}, "STAR 9 Skills Exercise 2: S Steps": {"id": "skills_star9_skills_exercise_2_s_steps", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 45, "discipline": "Skating Skills", "track": null, "levels": ["STAR 9"]}, "One-Foot Turn Sequence": {"id": "skills_star10_one_foot_turn_sequence", "definition_en": "A series of turns (three-turns, brackets, counters, rockers, loops and/or twizzles) skated entirely on one foot, with no free-foot touchdown or extra pushes, covering at least half the ice.", "source_page": 47, "discipline": "Skating Skills", "track": null, "levels": ["STAR 10"]}, "360 Degree Field Move Challenge": {"id": "skills_star10_360_degree_field_move_challenge", "definition_en": "A field move of the skater's choice held for a full 360 degrees, covering roughly a third of the ice.", "source_page": 47, "discipline": "Skating Skills", "track": null, "levels": ["STAR 10"]}, "Step Sequence": {"id": "skills_star10_step_sequence", "definition_en": "A step sequence (per the glossary) with at least four different types of turn, in any pattern, covering at least three-quarters of the ice.", "source_page": 47, "discipline": "Skating Skills", "track": null, "levels": ["STAR 10"]}, "STAR 10 Skills Exercise: Counters": {"id": "skills_star10_skills_exercise_counters", "definition_en": "An X & O pattern: large circles at each end skated in both directions, joined by diagonal prescribed steps.", "source_page": 48, "discipline": "Skating Skills", "track": null, "levels": ["STAR 10"]}, "9 Turn Challenge": {"id": "skills_gold_9_turn_challenge", "definition_en": "A challenge testing the turns developed through Skills: the skater draws a group of turns and performs them in order, each to its earlier STAR mandatory standard.", "source_page": 50, "discipline": "Skating Skills", "track": null, "levels": ["Gold"]}, "Field Move Sequence": {"id": "skills_gold_field_move_sequence", "definition_en": "Three field moves from at least two different categories, connected by any steps, turns, hops or comparable moves; covers at least three-quarters of the ice. Each field move held at least five seconds.", "source_page": 51, "discipline": "Skating Skills", "track": null, "levels": ["Gold"]}, "Skills Exercise Challenge": {"id": "skills_gold_skills_exercise_challenge", "definition_en": "A challenge testing the ability to perform any one of the STAR 6-10 Skills Exercise patterns.", "source_page": 51, "discipline": "Skating Skills", "track": null, "levels": ["Gold"]}, "Waltz Jump": {"id": "fs-el-1w-star-1", "definition_en": "A half-rotation edge jump with natural rotation launched from a forward outside edge. It is listed in Skate Canada's Scale of Values but not the ISU's.", "source_page": 8, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 1"]}, "Single Salchow": {"id": "fs-el-1s-star-1", "definition_en": "An edge jump with natural rotation leaving from a back inside edge; its Scale-of-Values listing depends on the number of turns.", "source_page": 8, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 1"]}, "Single Toe Loop": {"id": "fs-el-1t-star-1", "definition_en": "A toe-assisted jump with natural rotation that takes off from a back outside edge; its Scale-of-Values listing depends on the number of turns.", "source_page": 8, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 1"]}, "Forward Upright Spin": {"id": "fs-el-usp-star-1", "definition_en": "From a forward outside spiralling edge, a spin with the skating leg straight or slightly bent — not a camel position.", "source_page": 9, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 1"]}, "Backward Upright Spin": {"id": "fs-el-busp-star-1", "definition_en": "From a forward inside spiralling edge, a spin with the skating leg straight or slightly bent — not a camel position. A standstill start or back-outside pivot is allowed at this level only.", "source_page": 9, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 1"]}, "Single Loop": {"id": "fs-el-1lo-star-2", "definition_en": "An edge jump with natural rotation that takes off from a back outside edge; listed in the Scale of Values by number of turns.", "source_page": 10, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Single Flip": {"id": "fs-el-1f-star-2", "definition_en": "A toe-assisted jump with natural rotation that takes off from a back inside edge; listed in the Scale of Values by number of turns.", "source_page": 10, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Waltz + Single Toe Loop Combination": {"id": "fs-el-1w-1t-star-2", "definition_en": "A waltz jump taken immediately into a toe loop, using the waltz's landing edge as the toe loop's take-off.", "source_page": 10, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Forward Sit Spin": {"id": "fs-el-ssp-star-2", "definition_en": "A spin held in a sit position, the supporting leg bent to at least ninety degrees with its thigh parallel to the ice.", "source_page": 11, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Forward Camel Spin": {"id": "fs-el-csp-star-2", "definition_en": "A spin held in a spiral (camel) position, the free leg — knee and foot — carried at hip level or higher.", "source_page": 11, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Change Foot Upright Spin": {"id": "fs-el-cusp-star-2", "definition_en": "An upright spin with a foot change, at least three turns on each foot; entry may be forward or backward.", "source_page": 11, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Single Lutz": {"id": "fs-el-1lz-star-3", "definition_en": "A toe-assisted jump with counter rotation that takes off from a back outside edge; listed in the Scale of Values by number of turns.", "source_page": 12, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 3"]}, "Single Waltz + Single Loop Combination": {"id": "fs-el-1w-1lo-star-3", "definition_en": "A waltz jump taken straight into a loop, using the waltz's landing edge as the loop's take-off.", "source_page": 12, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 3"]}, "Single Loop + Single Loop Combination": {"id": "fs-el-1lo-1lo-star-3", "definition_en": "A loop jump taken straight into a second loop, the first loop's landing edge becoming the second's take-off.", "source_page": 12, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 3"]}, "Backward Sit Spin": {"id": "fs-el-ssp-star-3", "definition_en": "From a forward inside spiralling edge, a spin held in a sit position — supporting leg bent to at least ninety degrees, thigh parallel to the ice.", "source_page": 13, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 3"]}, "Forward Camel/Sit Combination Spin": {"id": "fs-el-cosp-star-3", "definition_en": "A forward combination spin changing from a camel to a sit, with at least two turns in each of the two positions.", "source_page": 13, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 3"]}, "Single Axel": {"id": "fs-el-1a-star-4", "definition_en": "An edge jump with natural rotation taking off from a forward outside edge; listed in the Scale of Values by number of turns. Unlike other singles it is one and a half turns.", "source_page": 14, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Single Flip + Single Toe Loop Combination": {"id": "fs-el-1f-1lo-star-4", "definition_en": "A flip jump taken straight into a toe loop, the flip's landing edge becoming the toe loop's take-off.", "source_page": 14, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Backward Camel Spin": {"id": "fs-el-csp-star-4", "definition_en": "From a forward inside spiralling edge, a spin held in a camel (spiral) position, the free leg at hip level or higher.", "source_page": 14, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Change Foot Sit Spin": {"id": "fs-el-cssp-star-4", "definition_en": "A sit spin with a foot change, at least three turns on each foot.", "source_page": 15, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Combination Spin or Change Combination Spin": {"id": "fs-el-cosp-or-ccosp-star-4", "definition_en": "A spin including a change of position — at least two different basic positions with two turns each, anywhere in the spin. It may or may not change feet; a change combination spin (CCoSp) adds a foot change with at least three turns per foot.", "source_page": 15, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Flying Camel Spin or Flying Sit Spin": {"id": "fs-el-fcsp-or-fssp-star-4", "definition_en": "A camel or sit spin entered with a jump that lands directly in the spinning position.", "source_page": 15, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Single Lutz + Single Toe Loop Combination": {"id": "fs-el-1lz-1t-star-5", "definition_en": "A Lutz taken straight into a toe loop, the Lutz's landing edge becoming the toe loop's take-off.", "source_page": 16, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 5"]}, "Spin in One Position": {"id": "fs-el-usp,-ssp-or-csp-star-5", "definition_en": "A spin using only one of the three basic positions, with no non-basic position; the final upright wind-up is not counted as a separate position.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 5"]}, "Sit Spin or Camel Spin": {"id": "fs-el-ssp-or-csp-star-6", "definition_en": "Sit position: a basic spin position with the upper part of the skating leg at least parallel to the ice. Camel position: a basic position with the free leg behind and the knee higher than the hip (layback/Biellmann count as upright, not camel).", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 6"]}, "Layback or Crossfoot Spin": {"id": "fs-el-lsp-or-usp-star-6", "definition_en": "Layback: an upright spin with head and shoulders leaning back and the back arched, free-leg position optional. Crossfoot: an upright variation with the feet crossed, toes together and weight even on both.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 6"]}, "Change Combination Spin": {"id": "fs-el-ccosp-star-6", "definition_en": "A combination spin with a foot change: a change-of-position spin holding at least two basic positions for two turns each, plus a foot change of at least three turns per foot. In STAR, all three basic positions are required.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 6"]}, "Flying camel sit spin": {"id": "fs-el-fcosp-star-7", "definition_en": "A spin entered with a clearly visible jump that lands directly in a spinning position.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 7"]}, "Sit or Camel Spin": {"id": "fs-el-ssp-or-csp-star-7", "definition_en": "Sit position: a basic spin position with the upper part of the skating leg at least parallel to the ice. Camel position: a basic position with the free leg behind and the knee higher than the hip (layback/Biellmann count as upright, not camel).", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 7"]}, "Sit Spin": {"id": "fs-el-ssp,-cssp,-fssp-or-fcssp-star-8", "definition_en": "A sit spin: held in a basic sit position with the upper skating leg at least parallel to the ice.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 8"]}, "Camel Spin": {"id": "fs-el-csp,-ccsp,-fcsp-or-fccsp-star-8", "definition_en": "A camel spin: held in a basic camel position with the free leg behind and the knee above hip level.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 8"]}, "Flying Change Combination Spin": {"id": "fs-el-fccosp-star-8", "definition_en": "A combination spin with a foot change: a change-of-position spin holding at least two basic positions for two turns each, plus a foot change of at least three turns per foot. In STAR, all three basic positions are required. Here entered with a flying entry.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 8"]}, "Forward Progressives": {"id": "dance_star1_forward_progressives", "definition_en": "A forward two-step sequence where the free foot passes the skating foot before stepping down: push onto an outside edge with the free leg extended about 30 degrees, let it pass and step onto an inside edge without crossing into the circle, then thrust the outside-edge foot under and outside the lobe to full extension. It is not a crossover. Skated consecutively around a full circle (about a hockey circle) in both directions.", "source_page": 12, "discipline": "Dance", "track": null, "levels": ["STAR 1"]}, "Forward Chasses": {"id": "dance_star1_forward_chasses", "definition_en": "A two-edge sequence (usually outside, then inside) where on the second edge the free foot is set down beside the skating foot - not ahead or behind - and lifted with the blade parallel to the ice. Skated consecutively around a full circle in both directions.", "source_page": 12, "discipline": "Dance", "track": null, "levels": ["STAR 1"]}, "Forward Slide Chasses": {"id": "dance_star1_forward_slide_chasses", "definition_en": "Like a chasse, but on the second step the free foot slides off the ice in front of the skating foot to full extension before returning beside it. Skated around a full circle in both directions.", "source_page": 12, "discipline": "Dance", "track": null, "levels": ["STAR 1"]}, "Forward Outside Swing Roll Sequence": {"id": "dance_star1_forward_outside_swing_roll_sequence", "definition_en": "A forward outside roll held several beats while the free leg swings back, then forward, then back beside to step the next; the swing gives a rolling feel. On a bent knee with the free leg about 30 degrees behind, the skating knee rises as the free leg comes forward. At least four consecutive swing rolls, two on each foot, along an axis.", "source_page": 12, "discipline": "Dance", "track": null, "levels": ["STAR 1"]}, "Forward Outside Cross Rolls": {"id": "dance_star1_forward_outside_cross_rolls", "definition_en": "The free leg passes the skating foot to the next outside curve as the body weight transfers edge to edge, creating a rolling movement, with the free foot set down in front. From an RFO or LFO edge the free foot extends behind and crosses to an outside edge on the opposite lobe. One cross roll on each foot, each performed in isolation.", "source_page": 12, "discipline": "Dance", "track": null, "levels": ["STAR 1"]}, "Dutch Waltz": {"id": "dance_star2a_dutch_waltz", "definition_en": "An introductory set-pattern waltz in Kilian hold, built mostly from progressive sequences linked by long rolling edges to slow waltz music.", "source_page": 15, "discipline": "Dance", "track": null, "levels": ["STAR 2"]}, "Canasta Tango": {"id": "dance_star2b_canasta_tango", "definition_en": "A simple set-pattern tango in reverse Kilian hold that introduces tango rhythm through large eight-count half-circles to build edge confidence.", "source_page": 18, "discipline": "Dance", "track": null, "levels": ["STAR 2"]}, "Baby Blues": {"id": "dance_star3a_baby_blues", "definition_en": "A set-pattern blues in Kilian hold built mainly from two-beat progressive sequences, with only steps 7 and 14 as longer four-beat edges.", "source_page": 21, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "Backward Progressives": {"id": "dance_star3b_backward_progressives", "definition_en": "A backward two-step sequence where the free foot passes the skating foot before stepping down, bringing the new free foot off the ice in front of the new skating foot: push backward onto an outside edge with the free leg extended in front, let it pass and step onto an inside edge without crossing behind into the circle, then thrust the outside-edge foot forward (slightly turned in) to full extension. Skated consecutively around a full circle in both directions.", "source_page": 24, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "Backward Chasses": {"id": "dance_star3b_backward_chasses", "definition_en": "A two-edge backward sequence (usually outside, then inside) where on the second edge the free foot is set down beside the skating foot - not ahead or behind - and lifted with the blade parallel to the ice. Skated consecutively around a full circle in both directions.", "source_page": 24, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "Backward Outside Swing Roll Sequence": {"id": "dance_star3b_backward_outside_swing_roll_sequence", "definition_en": "A backward outside roll held several beats while the free leg lifts and swings forward, then back past the skating foot, then back beside to step the next; the swing gives a rolling feel. On a bent knee with the free leg extended in front, the skating knee rises as the free leg extends about 30 degrees behind. At least four consecutive backward swing rolls, two on each foot, along an axis.", "source_page": 24, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "Forward Inside Open C Steps": {"id": "dance_star3b_forward_inside_open_c_steps", "definition_en": "Two open C steps from an RFI edge with the free foot extended behind, the heel then drawn to the skating foot before transferring to an LBI edge. The 'Swing' version holds two beats on the RFI and two on the LBI with the free leg fully extended behind; the 'Fiesta' version holds one beat on each, the free leg staying close in preparation for an RBO edge. One of each C step is performed.", "source_page": 24, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "RFO Cross Roll, Cross Behind": {"id": "dance_star3b_rfo_cross_roll_cross_behind", "definition_en": "From an LFO edge the free foot extends behind and crosses the skating foot's path to step onto an outside edge; after the weight transfers to the right foot, the left foot is brought back to step on an LFI edge with a tight cross behind (feet close), the right foot then fully extended in front. Performed once.", "source_page": 24, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "FO Three-Turn, BO Edge": {"id": "dance_star3b_fo_three_turn_bo_edge", "definition_en": "From a forward outside edge with the free foot fully extended behind on a bent knee, the skating knee rises as the free foot moves in to perform the three-turn; the feet stay close as the weight transfers to a back outside edge on the new foot, the free foot then fully extending forward. Performed twice, once starting RFO and once LFO.", "source_page": 24, "discipline": "Dance", "track": null, "levels": ["STAR 3"]}, "Swing Dance": {"id": "dance_star4a_swing_dance", "definition_en": "A beginner dance using all the basic forward and backward edges, giving a relaxed way to change between skating forward and backward; both partners skate identical steps, though not at the same time.", "source_page": 27, "discipline": "Dance", "track": null, "levels": ["STAR 4"]}, "Fiesta Tango": {"id": "dance_star4b_fiesta_tango", "definition_en": "A slow set-pattern tango that starts in reverse Kilian hold, switches to Kilian hold for the open C step at steps 10-11, and returns to reverse Kilian as the partners change from backward to forward at step 16.", "source_page": 32, "discipline": "Dance", "track": null, "levels": ["STAR 4"]}, "Willow Waltz": {"id": "dance_star5a_willow_waltz", "definition_en": "A set-pattern waltz skated entirely in closed hold; carriage, timing and clean footwork are the focus rather than difficulty.", "source_page": 35, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "LFO Open C Step": {"id": "dance_star5b_lfo_open_c_step", "definition_en": "An open C step on an LFO edge with the free foot extended behind; the free heel draws to the skating foot, the weight transfers to an RBO edge with the free leg staying close, in preparation for an LBI edge. Timing is one beat on the LFO and one on the RBO. Performed once.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "FO Double Knee Bend": {"id": "dance_star5b_fo_double_knee_bend", "definition_en": "From a forward outside edge created by a blade push, the free leg extends about 30 degrees behind; the skating knee starts bent for one count, rises for one, then bends again for two - a four-count edge (1+1+2). Performed on both RFO and LFO.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "Forward Progressive - Swing Roll Sequence": {"id": "dance_star5b_forward_progressive_swing_roll_sequence", "definition_en": "Begin with an LFO progressive exiting on LFO (LFO, RFI-Pr, LFO; timed 1+1+2), bring the feet together, then an RFO swing roll - free foot behind two counts on a bent knee, rising as it passes to the front, held two counts (2+2) - and repeat. At least four consecutive roll sequences, two on each foot, along an axis.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "Backward Progressive - Swing Roll Sequence": {"id": "dance_star5b_backward_progressive_swing_roll_sequence", "definition_en": "The same backward: an LBO progressive exiting on LBO (LBO, RBI-Pr, LBO; timed 1+1+2), feet together, then an RBO swing roll - free foot behind two counts, rising as it passes to the back, held two counts - and repeat. At least four consecutive sequences, two on each foot.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "Ten-Fox Progressive": {"id": "dance_star5b_ten_fox_progressive", "definition_en": "A forward progressive performed with the upper body externally rotated to face outside the circle (left arm in front, right arm behind); skated only counter-clockwise (LFO, RFI-Pr). At least half a circle.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "LFO Cross Behind": {"id": "dance_star5b_lfo_cross_behind", "definition_en": "From an LFO edge with the free leg extended behind, the right foot draws in to cross behind (inside the lobe) onto an RFI edge; the left free foot extends to the front then returns beside the skating foot in preparation for an LFO edge (neat feet). Performed once.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "FO Cross Rolls": {"id": "dance_star5b_fo_cross_rolls", "definition_en": "Forward outside cross rolls from an RFO or LFO edge: the free foot extends behind and internally rotates as it crosses the skating foot's path to step onto an outside curve on the opposite lobe, then repeats, creating a rolling feel from edge to edge. At least four consecutive cross rolls, two on each foot.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "FO Cross Roll, Three-Turn": {"id": "dance_star5b_fo_cross_roll_three_turn", "definition_en": "A forward outside cross roll into a three-turn on either foot: the free foot crosses behind onto the opposite lobe, the skater rises on the skating knee bringing the feet together through the turn, transfers weight to a back outside edge, then extends the free foot forward. Performed on both RFO and LFO.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "BO Rolls": {"id": "dance_star5b_bo_rolls", "definition_en": "Backward outside rolls - short or long curved edges starting on a BO edge with the free leg extended in front; the free foot draws in and steps closely onto the new edge, changing the lean toward the new lobe, the skating knee staying bent and the free foot not passing the skating foot. At least four consecutive rolls, two on each foot.", "source_page": 39, "discipline": "Dance", "track": null, "levels": ["STAR 5"]}, "Ten-Fox": {"id": "dance_star6a_ten_fox", "definition_en": "A set-pattern foxtrot combining parts of the old Tenstep and the Foxtrot, generally found easier and more enjoyable than either.", "source_page": 42, "discipline": "Dance", "track": null, "levels": ["STAR 6"]}, "European Waltz": {"id": "dance_star6b_european_waltz", "definition_en": "A set-pattern waltz skated in closed hold throughout, using cross-roll three-turns and back outside edges with all threes turned on count three ('European Waltz type' threes).", "source_page": 46, "discipline": "Dance", "track": null, "levels": ["STAR 6"]}, "Fourteenstep": {"id": "dance_star6c_fourteenstep", "definition_en": "A set-pattern dance of fourteen steps to a march, skated partnered (or solo/shadow) with timing, edges and hold the focus of assessment.", "source_page": 50, "discipline": "Dance", "track": null, "levels": ["STAR 6"]}, "Foxtrot": {"id": "dance_star7a_foxtrot", "definition_en": "An optional-pattern foxtrot that opens in open hold with shoulders and hips close, mixing cross rolls, three-turns, progressives and a closed C step on deep semicircular lobes.", "source_page": 53, "discipline": "Dance", "track": null, "levels": ["STAR 7"]}, "Tango": {"id": "dance_star7b_tango", "definition_en": "An optional-pattern tango that pairs quick crossed steps on shallow curves with slower rolls on strong curves, finishing with an open-hold promenade.", "source_page": 56, "discipline": "Dance", "track": null, "levels": ["STAR 7"]}, "American Waltz": {"id": "dance_star7c_american_waltz", "definition_en": "A set-pattern waltz of semicircular lobes skated toward and away from the midline, joined at the ends by six-beat outside swing rolls; its simple steps hide real difficulty because of the rotation involved.", "source_page": 60, "discipline": "Dance", "track": null, "levels": ["STAR 7"]}, "Kilian": {"id": "dance_star8a_kilian", "definition_en": "An optional-pattern march and a test of close, accurate footwork, unison of rotation and control, skated in Kilian hold throughout on a counterclockwise elliptical pattern.", "source_page": 63, "discipline": "Dance", "track": null, "levels": ["STAR 8"]}, "Rocker Foxtrot": {"id": "dance_star8b_rocker_foxtrot", "definition_en": "A set-pattern foxtrot that makes three lobes toward the barrier and two toward the midline along each side, so two sequences complete one circuit.", "source_page": 66, "discipline": "Dance", "track": null, "levels": ["STAR 8"]}, "Starlight Waltz": {"id": "dance_star8c_starlight_waltz", "definition_en": "A set-pattern waltz similar in character to the Viennese Waltz, opening in closed hold with three chasse sequences each ending on a strong outside edge.", "source_page": 69, "discipline": "Dance", "track": null, "levels": ["STAR 8"]}, "Paso Doble": {"id": "dance_star9a_paso_doble", "definition_en": "A dramatic, powerful Spanish optional-pattern dance demanding body control and precise footwork, expressed in either bull-fighting or Flamenco style.", "source_page": 74, "discipline": "Dance", "track": null, "levels": ["STAR 9"]}, "Blues": {"id": "dance_star9b_blues", "definition_en": "An optional-pattern blues skated with strong edges and deep knee action; the lead opens with a forward cross roll and the follow with a back cross roll, moving from partial outside to closed hold.", "source_page": 79, "discipline": "Dance", "track": null, "levels": ["STAR 9"]}, "Silver Samba": {"id": "dance_star9c_silver_samba", "definition_en": "An optional-pattern samba opening in Kilian hold with two run sequences, each ending in a 'quick cross-over slip RFI' where the free foot slips behind and across the tracing to accentuate the rhythm.", "source_page": 82, "discipline": "Dance", "track": null, "levels": ["STAR 9"]}, "Cha Cha Congelado": {"id": "dance_star10a_cha_cha_congelado", "definition_en": "An optional-pattern Latin dance meant to be felt in the body as well as the feet, structured to portray a '1, 2 cha-cha-cha' feeling; individual interpretation and pattern retrogressions are permitted.", "source_page": 88, "discipline": "Dance", "track": null, "levels": ["STAR 10"]}, "Westminster Waltz": {"id": "dance_star10b_westminster_waltz", "definition_en": "An optional-pattern waltz marked by stately carriage and elegant line, skated with strong edges and softly flowing knees, beginning in Kilian hold and changing to reverse Kilian between steps 5 and 6.", "source_page": 93, "discipline": "Dance", "track": null, "levels": ["STAR 10"]}, "Quickstep": {"id": "dance_star10c_quickstep", "definition_en": "A fast, bright set-pattern dance skated in Kilian hold throughout with both partners on the same steps, requiring the couple to stay hip-to-hip.", "source_page": 98, "discipline": "Dance", "track": null, "levels": ["STAR 10"]}, "Viennese Waltz": {"id": "dance_golda_viennese_waltz", "definition_en": "A light, lilting optional-pattern waltz on strongly curved edges, needing soft knees, neat feet and elegant carriage.", "source_page": 101, "discipline": "Dance", "track": null, "levels": ["Gold"]}, "Argentine Tango": {"id": "dance_goldb_argentine_tango", "definition_en": "A set-pattern tango skated with strong edges and considerable elan, needing good flow and fast travel without obvious effort.", "source_page": 106, "discipline": "Dance", "track": null, "levels": ["Gold"]}, "Gold Rhythm Dance": {"id": "dance_goldc_rhythm_dance", "definition_en": "A skater/coach-choreographed rhythm dance to music of designated rhythm(s), combining four required elements with steps and movements that reflect the music's character; it may be skated solo, shadow, or with a partner.", "source_page": 111, "discipline": "Dance", "track": null, "levels": ["Gold"]}, "Choreographic Step Sequence": {"id": "artistic_chst", "definition_en": "A sequence focused on musicality and movement that incorporates steps, turns and field moves; pattern must be circular, straight-line or serpentine, clearly visible, covering at least three-quarters of the ice.", "source_page": 7, "discipline": "Artistic", "track": null, "levels": ["STAR 5", "STAR 7", "STAR 9", "Gold"]}, "Artistic Spin": {"id": "artistic_asp", "definition_en": "A spin matching the music's character/interpretation and creative in nature; the skater may hold one position or move through several. At least three revolutions are needed to meet the spin definition, and a centre must be clearly established.", "source_page": 7, "discipline": "Artistic", "track": null, "levels": ["STAR 5", "STAR 7", "STAR 9", "Gold"]}, "360 Degree Field Move": {"id": "artistic_360fm", "definition_en": "A single field-move position of the skater's choice sustained on a 360-degree pattern that covers nearly the width of the ice and at least one-third of its length. (Gold only.)", "source_page": 8, "discipline": "Artistic", "track": null, "levels": ["Gold"]}, "Single Loop Jump": {"id": "fs-el-1lo-star-2", "definition_en": "An edge jump with natural rotation that takes off from a back outside edge; listed in the Scale of Values by number of turns.", "source_page": 10, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Waltz + Single Toe Loop combination": {"id": "fs-el-1w-1t-star-2", "definition_en": "A waltz jump taken immediately into a toe loop, using the waltz's landing edge as the toe loop's take-off.", "source_page": 10, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 2"]}, "Choreographic Sequence": {"id": "artistic_chst", "definition_en": "A sequence focused on musicality and movement that incorporates steps, turns and field moves; pattern must be circular, straight-line or serpentine, clearly visible, covering at least three-quarters of the ice.", "source_page": 7, "discipline": "Artistic", "track": null, "levels": ["STAR 5", "STAR 7", "STAR 9", "Gold"]}, "Flying Sit Spin or Flying Camel Spin": {"id": "fs-el-fcsp-or-fssp-star-4", "definition_en": "A camel or sit spin entered with a jump that lands directly in the spinning position.", "source_page": 15, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Flying Camel or Flying Sit Spin in One Position": {"id": "fs-el-fcsp-or-fssp-star-4", "definition_en": "A camel or sit spin entered with a jump that lands directly in the spinning position.", "source_page": 15, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 4"]}, "Change Combination Spin (1 change of foot)": {"id": "fs-el-ccosp-star-6", "definition_en": "A combination spin with a foot change: a change-of-position spin holding at least two basic positions for two turns each, plus a foot change of at least three turns per foot. In STAR, all three basic positions are required.", "source_page": 52, "discipline": "Free Skate", "track": "elements", "levels": ["STAR 6"]}}};

function hydrateArtisticLevels(){
  const bucket = CONTENT.buckets.artistic || {};
  const source = bucket['STAR 5'] || [];
  const sharedFor = lvl => source
    .filter(el => (el.levels || []).includes(lvl) && el.id !== 'artistic_spsq')
    .map(el => ({...el, id: el.id + '_' + lvl.toLowerCase().replace(/[^a-z0-9]+/g,'_'), levels:[lvl], related_ids: el.related_ids || null}));
  for(const lvl of ['STAR 7','STAR 9']){
    if(!bucket[lvl] || bucket[lvl].length === 0){
      bucket[lvl] = sharedFor(lvl);
    }
  }
  const goldShared = sharedFor('Gold');
  const goldOnly = bucket['Gold'] || [];
  bucket['Gold'] = [...goldShared, ...goldOnly.filter(el => el.id === 'artistic_360fm')];
  for(const lvl of ['STAR 7','STAR 9','Gold']){
    for(const el of (bucket[lvl] || [])) CONTENT.byId[el.id] = el;
  }
}
hydrateArtisticLevels();

function buildFlat(){
  FLAT = [];
  const tab = TABS.find(t=>t.id===CUR);
  const tabBucket = CONTENT.buckets[tab.id] || {};
  for(const lvl of CONTENT.levelOrder[tab.id]){
    for(const el of (tabBucket[lvl]||[])){
      FLAT.push({tabId:tab.id, color:tab.color, discLabel:tab.label, lvl, el});
    }
  }
}

function discTabs(){
  document.getElementById('disc-nav').innerHTML = TABS.map(t=>
    `<button type="button" class="disc-tab ${t.color} ${t.id===CUR?'active':''}" onclick="setTab('${t.id}')" aria-pressed="${t.id===CUR}">
       <span class="disc-dot ${t.color}" aria-hidden="true"></span>${esc(t.label)}</button>`).join('');
}

function levelNav(){
  const tab = TABS.find(t=>t.id===CUR);
  const order = CONTENT.levelOrder[tab.id] || [];
  document.getElementById('level-nav').innerHTML = order.map(l=>
    `<button type="button" class="level-chip" onclick="jumpTo('lvl-${tab.id}-${encodeURIComponent(l)}')">${esc(l)}</button>`).join('');
}

function render(){
  const t = UI[LANG];
  const heroEyebrow = document.getElementById('hero-eyebrow');
  heroEyebrow.textContent = t.heroEyebrow;
  heroEyebrow.hidden = !has(t.heroEyebrow);
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-lead').textContent = t.heroLead;
  const heroSub = document.getElementById('hero-sub');
  heroSub.textContent = t.heroSub;
  heroSub.hidden = !has(t.heroSub);
  document.getElementById('search').placeholder = t.searchPlaceholder;
  document.getElementById('info-text').innerHTML = t.infoText;
  document.getElementById('footer-text').innerHTML = t.footer;
  document.getElementById('no-results-text').textContent = t.noResults;
  document.getElementById('no-results-btn').textContent = t.clearBtn;

  const tab = TABS.find(t=>t.id===CUR);
  document.body.className = 'd-'+tab.color;
  discTabs(); levelNav();

  const order = CONTENT.levelOrder[tab.id] || [];
  const bucket = CONTENT.buckets[tab.id] || {};
  FLAT = [];
  let html = '';

  for(const lvl of order){
    const elements = bucket[lvl] || [];
    const lvlMeta = CONTENT.levelMeta[`${tab.discipline}|${tab.track||''}|${lvl}`] || null;

    let body = '';
    if(elements.length === 0){
      // Level-meta-only level (FS-Program rows). Show an honest notice.
      const note = lvlMeta && has(lvlMeta.elements_in_guide) && lvlMeta.elements_in_guide.includes('deferred')
        ? 'The program guide does not enumerate per-element content for this level. Required elements are listed on the official Freeskate Program assessment sheet / Competition Program Requirements. The level summary below covers program length, content requirement and program components.'
        : 'No element-level content is available for this level in the official guide. See the level summary below.';
      body = `<div class="deferred-notice"><strong>Refer to the official assessment sheet.</strong> ${esc(note)}</div>`;
    } else {
      // Group elements by category
      const cats = [];
      const byCat = {};
      for(const el of elements){
        const cat = inferCategory(el);
        if(!byCat[cat]){ byCat[cat] = []; cats.push(cat); }
        byCat[cat].push(el);
      }
      const ncat = cats.length;
      const cols = ncat>=4 ? 2 : (ncat===1 ? 1 : ncat);
      let secHtml = '';
      const levelVideos = getLevelVideos(tab.id, lvl);
      const levelVideoLink = levelVideos.length ? `<a class="level-video-link" href="${esc(levelVideos[0].url)}" target="_blank" rel="noopener">Watch example</a>` : '';
      for(const [catIndex, cat] of cats.entries()){
        const rows = byCat[cat].map(el=>{
          const idx = FLAT.push({tabId:tab.id, color:tab.color, discLabel:tab.label, lvl, el}) - 1;
          const hasVid = getVideosForElement(el).length > 0;
          const code = has(el.code) && tab.id !== 'skills' ? `<span class="skill-code">${esc(el.code)}</span>` : '';
          const subParts = [];
          if(el.test) subParts.push(el.test);
          if(el.dance_meta){
            if(el.dance_meta.music) subParts.push(el.dance_meta.music);
            if(el.dance_meta.tempo) subParts.push(el.dance_meta.tempo);
          }
          const sub = subParts.length ? `<span class="skill-sub">${esc(subParts.join(' · '))}</span>` : '';
          const search = (el.name+' '+(el.code||'')+' '+(el.definition_en||'')+' '+(el.description_en||'')+' '+(el.test||'')).toLowerCase();
          const playIcon = (tab.id==='fs-program' || tab.id==='artistic') ? '' : `<span class="play-dot ${hasVid?'':'no-vid'}" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>`;
          return `<li><button type="button" class="skill-row ${tab.id==='fs-program'||tab.id==='artistic'?'no-play':''}" data-fi="${idx}" data-search="${esc(search)}" onclick="openPanel(${idx})">
            ${playIcon}
            <span class="skill-text"><span class="skill-en">${esc(el.name)}</span>${sub}</span>
            ${code}
          </button></li>`;
        }).join('');
        secHtml += `<div class="section" data-cat="${esc(cat)}">
          <div class="sec-head"><span class="sec-head-label"><span class="sec-dot" aria-hidden="true"></span>${esc(cat)}</span>${catIndex===0 ? levelVideoLink : ''}</div>
          <ul class="skill-list">${rows}</ul>
          <div class="sec-empty" hidden></div></div>`;
      }
      body = `<div class="cat-grid" style="grid-template-columns:repeat(${cols},1fr)">${secHtml}</div>`;
    }

    // Level meta accordion (Length → Honours → Pass)
    let metaHtml = '';
    if(lvlMeta){
      const rows = [];
      if(has(lvlMeta.program_length))    rows.push(`<div class="lm-row"><div class="lm-label">Length</div><div class="lm-text">${esc(lvlMeta.program_length)}</div></div>`);
      if(has(lvlMeta.program_note))      rows.push(`<div class="lm-row"><div class="lm-label">Program note</div><div class="lm-text">${esc(lvlMeta.program_note)}</div></div>`);
      if(has(lvlMeta.content_requirement_en)) rows.push(`<div class="lm-row"><div class="lm-label">Content required</div><div class="lm-text">${esc(lvlMeta.content_requirement_en)}</div></div>`);
      if(has(lvlMeta.program_components_en))  rows.push(`<div class="lm-row"><div class="lm-label">Components</div><div class="lm-text">${esc(lvlMeta.program_components_en)}</div></div>`);
      if(has(lvlMeta.honours_text)) rows.push(`<div class="lm-row honours"><div class="lm-label">Pass + Honours</div><div class="lm-text">${esc(lvlMeta.honours_text)}</div></div>`);
      if(has(lvlMeta.pass_text))    rows.push(`<div class="lm-row pass"><div class="lm-label">Pass</div><div class="lm-text">${esc(lvlMeta.pass_text)}</div></div>`);
      // Source: keep only the web-rule URL (clickable, actually consultable).
      // PDF page numbers are removed — they add mental load for readers who
      // don't have the guide, and trust comes from accuracy not citations.
      if(has(lvlMeta.program_source_url)){
        rows.push(`<div class="lm-row"><div class="lm-label">Source</div><div class="lm-text"><a href="${esc(lvlMeta.program_source_url)}" target="_blank" rel="noopener" style="color:var(--accent);">${esc(lvlMeta.program_source_label || 'Skate Canada web rule')} \u2197</a></div></div>`);
      }
      if(rows.length){
        metaHtml = `<details class="level-meta"><summary>Show pass criteria for ${esc(lvl)}</summary><div class="level-meta-body">${rows.join('')}</div></details>`;
      }
    }

    html += `<section class="level" id="lvl-${tab.id}-${encodeURIComponent(lvl)}">
      <div class="level-title">
        <span class="lt-name">${esc(lvl)}</span>
        <span class="lt-count">${elements.length} element${elements.length===1?'':'s'}</span>
      </div>
      <div class="level-block">${body}</div>
      ${metaHtml}
    </section>`;
  }

  document.getElementById('levels').innerHTML = html;
  onSearch();
}

/* Heuristic to bucket elements into category sections for display.
   This is render-side grouping only — never substitutes content. */
function inferCategory(el){
  const tab = TABS.find(t=>t.id===CUR);
  if(tab.id==='dance'){
    if(el.dance_type==='pattern') return 'Pattern Dance';
    if(el.dance_type==='element') return 'Dance Elements';
    if(el.dance_type==='rhythm_dance') return 'Rhythm Dance';
    return 'Dance';
  }
  if(tab.id==='fs-elements'){
    if(el.category==='jump') return 'Jumps';
    if(el.category==='spin') return 'Spins';
    return 'Other';
  }
  if(tab.id==='skills'){
    const n = (el.name||'').toLowerCase();
    if(/edges?$/.test(n)||/circle on circle/.test(n)||/changes? of edge/.test(n)) return 'Edges';
    if(/three[- ]turn|bracket|rocker|counter|loop|twizzle|s steps?|s-steps?|double three/.test(n)) return 'Turns';
    if(/spiral|field move/.test(n)) return 'Field Moves';
    return 'Exercises & Sequences';
  }
  if(tab.id==='artistic'){
    return 'Required Element';
  }
  return 'Elements';
}

function setTab(id){ CUR = id; CUR_IDX = -1; render();
renderPreloadedVideoStats(); window.scrollTo({top:0,behavior:'auto'}); }
function jumpTo(id){ const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

/* Search */
function onSearch(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('show', q.length>0);
  let anyVisible = false;
  document.querySelectorAll('.level').forEach(lvlEl=>{
    let lvlHas = false;
    lvlEl.querySelectorAll('.section').forEach(sec=>{
      let secHas = false;
      sec.querySelectorAll('.skill-row').forEach(row=>{
        const match = !q || row.dataset.search.includes(q);
        row.closest('li').hidden = !match;
        if(match){ secHas = true; lvlHas = true; anyVisible = true; }
        const enEl = row.querySelector('.skill-en');
        enEl.innerHTML = q && match ? hl(enEl.textContent,q) : esc(enEl.textContent);
      });
      const list = sec.querySelector('.skill-list');
      if(list) list.style.display = secHas ? '' : 'none';
      sec.style.display = (q && !secHas) ? 'none' : '';
    });
    lvlEl.classList.toggle('hidden', !!q && !lvlHas);
  });
  document.getElementById('no-results').classList.toggle('show', !!q && !anyVisible);
}
function hl(text,q){
  const i = text.toLowerCase().indexOf(q);
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}
function clearSearch(){ const s = document.getElementById('search'); s.value = ''; onSearch(); s.focus(); }

/* Panel */
function openPanel(idx){
  if(idx<0) return;
  LAST_FOCUSED = document.activeElement;
  fillPanel(idx);
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('panel-close').focus();
}

function fillPanel(idx){
  CUR_IDX = idx;
  const r = FLAT[idx];
  const el = r.el;
  const t = UI[LANG];
  const tag = document.getElementById('panel-tag');
  tag.className = 'panel-tag '+r.color;
  const lvlsList = (el.levels||[]).join(' · ');
  tag.textContent = `${r.discLabel} · ${lvlsList}`;

  // Title with optional code
  const codeChip = has(el.code) && r.tabId !== 'skills' && !String(el.name||'').toLowerCase().includes(String(el.code).toLowerCase()) ? `<span class="panel-code">${esc(el.code)}</span>` : '';
  document.getElementById('panel-title').innerHTML = `${esc(el.name)} ${codeChip}`;

  document.getElementById('panel-subtitle').textContent = '';
  const panelActions = document.getElementById('panel-actions');
  const headerVideos = getVideosForElement(el);
  if(panelActions){
    if(r.tabId === 'fs-program' && headerVideos.length){
      const v = headerVideos[0];
      panelActions.innerHTML = '';
    } else {
      panelActions.innerHTML = '';
    }
  }

  // Build the body STRICTLY with null-omission, but with one exception:
  // for elements whose `definition_en` is null because the registry only
  // stores it on the first appearance (e.g. Single Axel at STAR 5/9/10
  // references STAR 4's definition), we inline the canonical definition
  // text here so every panel is self-contained. This trades a few duplicated
  // bytes for far better UX — no back-and-forth between panels to learn
  // what an element is.
  let body = '';

  // Definition: prefer this entry's own text; otherwise look up the canonical
  // same-named entry's definition and show it inline (no link, just the text).
  if(has(el.definition_en)){
    body += `<div class="detail-block"><div class="detail-label">${t.defLabel}</div>
      <p class="detail-text">${esc(el.definition_en)}</p></div>`;
  } else {
    const canonical = CONTENT.canonicalDefByName[el.name];
    if(canonical){
      body += `<div class="detail-block"><div class="detail-label">${t.defLabel}</div>
        <p class="detail-text">${esc(canonical.definition_en)}</p></div>`;
    }
  }

  // Description (or, when only a delta exists, a "What's different at this level" box).
  // These are NOT mutually exclusive with the Definition above — they layer on top.
  if(has(el.description_en)){
    body += `<div class="detail-block"><div class="detail-label">${t.descLabel}</div>
      <div class="detail-desc"><p class="detail-text">${esc(el.description_en)}</p></div></div>`;
  } else if(has(el.delta_en)){
    body += `<div class="detail-block"><div class="detail-label">What\u2019s different at this level</div>
      <div class="detail-desc"><p class="detail-text">${esc(el.delta_en)}</p></div></div>`;
  }

  // Note
  if(has(el.note_en)){
    body += `<div class="detail-block"><div class="detail-label">${t.noteLabel}</div>
      <div class="detail-note"><p class="detail-text">${esc(el.note_en)}</p></div></div>`;
  }

  // Mandatory — labelled "To pass" (plain language); amber box. Source text
  // renders as-is now that the section above is labelled "Definition," so any
  // "Must meet the element definition" phrasing reads naturally.
  if(has(el.mandatory_en)){
    body += `<div class="detail-block"><div class="detail-label">${t.reqLabel}</div>
      <div class="detail-mand"><p class="detail-text">${esc(el.mandatory_en)}</p></div></div>`;
  }


  // Related variants (cross-links to different elements — variant pairs like
  // Forward/Backward Loops, or Skills↔Artistic sibling elements). Same-name
  // recurrences are already surfaced at the top of the panel; we exclude them
  // here so this disclosure stays focused on genuine comparisons.
  const variants = (el.related_ids || [])
    .map(id => CONTENT.byId[id])
    .filter(x => x && x.name !== el.name);
  if(variants.length){
    const links = variants
      .map(x=>`<a class="related-link" data-related="${esc(x.id)}">→ ${esc(x.name)} <em style="color:var(--text3);font-size:0.9em">(${esc(x.discipline)} · ${esc((x.levels||[]).join(', '))})</em></a>`)
      .join('');
    body += `<details class="detail-related-disclosure">
      <summary>Related variants (${variants.length})</summary>
      <div class="detail-related">${links}</div>
    </details>`;
  }

  const videos = getVideosForElement(el);
  if(videos.length && r.tabId !== 'fs-program'){
    const cards = videos.map(v=>`<a class="video-card" href="${esc(v.url)}" target="_blank" rel="noopener">
      <img src="${esc(v.thumbnail || '')}" alt="" loading="lazy">
      <span><span class="video-card-title">${esc(v.title || 'Skate Canada video')}</span></span>
    </a>`).join('');
    body += `<div class="detail-block"><div class="detail-label">${t.watchVid || 'Watch matched videos'}</div><div class="video-list">${cards}</div></div>`;
  }

document.getElementById('panel-body').innerHTML = body;

  // Wire related-link clicks (they're inside innerHTML so attach after)
  document.querySelectorAll('.related-link[data-related]').forEach(a=>{
    a.onclick = (ev)=>{
      ev.preventDefault();
      const id = a.dataset.related;
      // Find FLAT index of target element across all tabs — switch tab if needed
      const target = CONTENT.byId[id];
      if(!target) return;
      const targetTab = TABS.find(t=>t.discipline===target.discipline && (t.track||null)===(target.track||null));
      if(targetTab && targetTab.id !== CUR){
        CUR = targetTab.id; buildFlat();
      }
      const targetIdx = FLAT.findIndex(f=>f.el.id===id);
      if(targetIdx>=0){ fillPanel(targetIdx); }
    };
  });
}

function closePanel(){ document.getElementById('panel').classList.remove('open'); document.body.style.overflow=''; if(LAST_FOCUSED) LAST_FOCUSED.focus(); }
function setLang(l){ LANG = l; document.getElementById('lang-en').classList.toggle('active',l==='en'); document.getElementById('lang-zh').classList.toggle('active',l==='zh'); render();
renderPreloadedVideoStats(); }


/* Video linker */
function loadSavedVideoLinks(){
  VIDEO_LINKS = JSON.parse(JSON.stringify(PRELOADED_VIDEO_LINKS));
}
function saveVideoLinks(){ localStorage.setItem('starskateVideoLinks', JSON.stringify(VIDEO_LINKS)); }
function preloadVideoCount(){
  return Object.values(PRELOADED_VIDEO_LINKS).reduce((sum, list)=>sum + (Array.isArray(list) ? list.length : 0), 0);
}
function showVideoCoverage(){
  const rows = Object.entries(PRELOADED_VIDEO_LINKS).flatMap(([id, vids])=>{
    const el = CONTENT.byId[id];
    return (vids || []).map(v=>({element: el ? el.name : id, level: el && el.levels ? el.levels.join(', ') : '', video:v}));
  });
  const results = document.getElementById('video-results');
  if(!results) return;
  results.hidden = false;
  results.innerHTML = `<table><thead><tr><th>Element</th><th>Video</th><th>Time</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.level)}<br><strong>${esc(r.element)}</strong></td><td><a href="${esc(r.video.url)}" target="_blank" rel="noopener">${esc(r.video.title)}</a></td><td>${esc(r.video.duration || '')}</td></tr>`).join('')}</tbody></table>`;
}
function renderPreloadedVideoStats(){
  const stats = document.getElementById('video-stats');
  if(!stats) return;
  stats.hidden = false;
  stats.innerHTML = `<div class="video-stat"><span>Folders</span><b>46</b></div><div class="video-stat"><span>Videos linked</span><b>${preloadVideoCount()}</b></div><div class="video-stat"><span>Elements covered</span><b>${Object.keys(PRELOADED_VIDEO_LINKS).length}</b></div><div class="video-stat"><span>API key</span><b>Not needed</b></div>`;
}
function getLevelVideos(tabId, lvl){
  const key = `${tabId}|${lvl}`;
  if(Array.isArray(LEVEL_VIDEO_LINKS[key])) return LEVEL_VIDEO_LINKS[key];
  if(tabId==='fs-program'){
    const rows = (CONTENT.buckets['fs-program'] || {})[lvl] || [];
    for(const el of rows){
      const vids = getVideosForElement(el);
      if(vids.length) return [vids[0]];
    }
  }
  return [];
}
function getVideosForElement(el){
  const key = videoKeyFor(el);
  const direct = Array.isArray(VIDEO_LINKS[key]) ? VIDEO_LINKS[key] : [];
  const withoutRetry = (list)=>list.filter(v => !/\bretry\b/i.test(v && v.title || ''));
  if(direct.length) return withoutRetry(direct);
  const byNameKey = 'name:' + normalizeText(`${(el.levels||[]).join(' ')} ${el.name}`);
  return Array.isArray(VIDEO_LINKS[byNameKey]) ? withoutRetry(VIDEO_LINKS[byNameKey]) : [];
}
function normalizeText(s){
  return String(s||'').toLowerCase()
    .replace(/&/g,' and ')
    .replace(/\bfree skate\b/g,'freeskate')
    .replace(/\bstar\s*(\d+)/g,'star $1')
    .replace(/[^a-z0-9]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function tokens(s){
  const stop = new Set(['the','and','or','of','to','a','an','with','at','above','below','standard','assessment','demo','video','skate','canada','starlite']);
  return normalizeText(s).split(' ').filter(x=>x && !stop.has(x));
}
function scoreVideoForElement(video, row){
  const title = normalizeText(`${video.title} ${video.playlistTitle||''}`);
  const name = normalizeText(row.el.name);
  const level = normalizeText(row.lvl);
  let score = 0;
  if(title.includes(name)) score += 62;
  const nt = tokens(row.el.name);
  const vt = new Set(tokens(title));
  const hits = nt.filter(x=>vt.has(x)).length;
  if(nt.length) score += Math.round((hits / nt.length) * 30);
  if(level && title.includes(level)) score += 14;
  const disc = normalizeText(row.discLabel);
  if(disc && title.includes(disc.split(' ')[0])) score += 5;
  if(row.el.code && title.includes(normalizeText(row.el.code))) score += 8;
  return Math.min(100, score);
}
function standardFromTitle(title){
  const n = normalizeText(title);
  if(n.includes('above standard')) return 'Above standard';
  if(n.includes('below standard')) return 'Below standard';
  if(n.includes('at standard')) return 'At standard';
  return '';
}
async function ytFetch(path, key, params){
  const url = new URL('https://www.googleapis.com/youtube/v3/' + path);
  Object.entries({...params, key}).forEach(([k,v])=>{ if(v!==undefined && v!==null) url.searchParams.set(k, v); });
  const res = await fetch(url.toString());
  if(!res.ok){
    let msg = res.status + ' ' + res.statusText;
    try{ const data = await res.json(); msg = data.error && data.error.message ? data.error.message : msg; }catch(e){}
    throw new Error(msg);
  }
  return res.json();
}
function setVideoStatus(html){ const el = document.getElementById('video-status'); if(el) el.innerHTML = html; }
async function scanYouTubeLibrary(){
  const key = document.getElementById('yt-api-key').value.trim();
  const handle = document.getElementById('yt-channel-handle').value.trim().replace(/^https?:\/\/www\.youtube\.com\//,'').replace(/^\//,'') || '@skatingdevelopmentvideolib9302';
  if(!key){ setVideoStatus('Paste a YouTube Data API key first.'); return; }
  const btn = document.getElementById('scan-videos-btn');
  btn.disabled = true;
  try{
    setVideoStatus('Finding the channel...');
    const channel = await ytFetch('channels', key, {part:'id,snippet', forHandle: handle.startsWith('@') ? handle : '@' + handle});
    if(!channel.items || !channel.items.length) throw new Error('Could not find that YouTube channel handle.');
    const channelId = channel.items[0].id;
    let playlists = [], pageToken = '';
    do{
      const data = await ytFetch('playlists', key, {part:'snippet,contentDetails', channelId, maxResults:'50', pageToken});
      playlists = playlists.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      setVideoStatus(`Found <strong>${playlists.length}</strong> playlists. Reading videos...`);
    }while(pageToken);
    let videos = [];
    for(const p of playlists){
      let itemToken = '';
      do{
        const data = await ytFetch('playlistItems', key, {part:'snippet,contentDetails', playlistId:p.id, maxResults:'50', pageToken:itemToken});
        for(const item of (data.items || [])){
          const sn = item.snippet || {};
          const vid = item.contentDetails && item.contentDetails.videoId;
          if(!vid || sn.title === 'Private video' || sn.title === 'Deleted video') continue;
          videos.push({
            id: vid,
            title: sn.title,
            url: 'https://www.youtube.com/watch?v=' + vid,
            playlistId: p.id,
            playlistTitle: p.snippet ? p.snippet.title : '',
            thumbnail: sn.thumbnails && (sn.thumbnails.medium || sn.thumbnails.default) ? (sn.thumbnails.medium || sn.thumbnails.default).url : '',
            standard: standardFromTitle(sn.title + ' ' + (p.snippet ? p.snippet.title : ''))
          });
        }
        itemToken = data.nextPageToken || '';
      }while(itemToken);
      setVideoStatus(`Read <strong>${videos.length}</strong> videos. Matching...`);
    }
    const matches = matchVideosToElements(videos);
    VIDEO_LINKS = matches.links;
    saveVideoLinks();
    renderVideoSummary(matches, videos.length, playlists.length);
    render();
renderPreloadedVideoStats();
  }catch(err){
    setVideoStatus('Scan failed: ' + esc(err.message || err));
  }finally{
    btn.disabled = false;
  }
}
function allElementRows(){
  const rows = [];
  for(const tab of TABS){
    const bucket = CONTENT.buckets[tab.id] || {};
    for(const lvl of (CONTENT.levelOrder[tab.id] || [])){
      for(const el of (bucket[lvl] || [])) rows.push({tabId:tab.id, discLabel:tab.label, lvl, el});
    }
  }
  return rows;
}
function matchVideosToElements(videos){
  const rows = allElementRows();
  const links = {};
  const review = [];
  for(const row of rows){
    const scored = videos.map(v=>({...v, score:scoreVideoForElement(v,row)})).filter(v=>v.score>=58).sort((a,b)=>b.score-a.score).slice(0,4);
    if(scored.length){
      links[videoKeyFor(row.el)] = scored.map(v=>({title:v.title,url:v.url,thumbnail:v.thumbnail,playlistTitle:v.playlistTitle,standard:v.standard,score:v.score}));
    }
    review.push({row, best:scored[0] || null});
  }
  return {links, review};
}
function renderVideoSummary(matches, videoCount, playlistCount){
  const linked = Object.keys(matches.links).length;
  const total = allElementRows().length;
  setVideoStatus(`Loaded <strong>${videoCount}</strong> videos from <strong>${playlistCount}</strong> playlists. Matched <strong>${linked}</strong> of <strong>${total}</strong> elements. Export the JSON after reviewing low-confidence rows.`);
  const stats = document.getElementById('video-stats');
  stats.hidden = false;
  stats.innerHTML = `<div class="video-stat"><span>Videos</span><b>${videoCount}</b></div><div class="video-stat"><span>Playlists</span><b>${playlistCount}</b></div><div class="video-stat"><span>Elements matched</span><b>${linked}</b></div><div class="video-stat"><span>Needs review</span><b>${matches.review.filter(x=>!x.best || x.best.score<75).length}</b></div>`;
  const low = matches.review.filter(x=>!x.best || x.best.score<75).slice(0,80);
  const results = document.getElementById('video-results');
  results.hidden = false;
  results.innerHTML = `<table><thead><tr><th>Element</th><th>Best video</th><th>Score</th></tr></thead><tbody>${low.map(x=>`<tr><td>${esc(x.row.lvl)} · ${esc(x.row.discLabel)}<br><strong>${esc(x.row.el.name)}</strong></td><td>${x.best ? `<a href="${esc(x.best.url)}" target="_blank" rel="noopener">${esc(x.best.title)}</a><br>${esc(x.best.playlistTitle||'')}` : 'No match'}</td><td><span class="video-match-pill ${x.best && x.best.score>=75 ? '' : 'low'}">${x.best ? x.best.score : 0}%</span></td></tr>`).join('')}</tbody></table>`;
}
function exportVideoLinks(){
  const payload = {generatedAt:new Date().toISOString(), source:CHANNEL_URL, links:VIDEO_LINKS};
  downloadText('starskate-video-links.json', JSON.stringify(payload,null,2), 'application/json');
}
function importVideoPayload(payload){
  VIDEO_LINKS = payload.links || payload || {};
  saveVideoLinks();
  setVideoStatus(`Imported video links for <strong>${Object.keys(VIDEO_LINKS).length}</strong> elements.`);
  render();
renderPreloadedVideoStats();
}
function importVideoLinksText(){
  const raw = document.getElementById('manual-video-json').value.trim();
  if(!raw){ setVideoStatus('Paste JSON first.'); return; }
  try{ importVideoPayload(JSON.parse(raw)); }
  catch(e){ setVideoStatus('That JSON could not be read.'); }
}
function importVideoLinksFile(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => { try{ importVideoPayload(JSON.parse(reader.result)); } catch(e){ setVideoStatus('That file could not be read.'); } };
  reader.readAsText(file);
  event.target.value = '';
}
function clearVideoLinks(){
  VIDEO_LINKS = {}; saveVideoLinks(); setVideoStatus('Cleared saved video links.'); render();
renderPreloadedVideoStats();
}
function downloadElementListCsv(){
  const rows = [['id','discipline','tab','level','element','code','definition']];
  for(const r of allElementRows()) rows.push([r.el.id,r.discLabel,r.tabId,r.lvl,r.el.name,r.el.code||'',r.el.definition_en||'']);
  const csv = rows.map(row=>row.map(cell=>'"'+String(cell).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  downloadText('starskate-elements.csv', csv, 'text/csv');
}
function downloadText(filename, text, type){
  const blob = new Blob([text], {type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
}
loadSavedVideoLinks();
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && document.getElementById('panel').classList.contains('open')) closePanel();
});
document.getElementById('search').addEventListener('input', onSearch);

render();
renderPreloadedVideoStats();
