null, "discipline": "Dance", "track": null, "levels": ["STAR 5"], "definition_en": "A forward outside cross roll into a three-turn on either foot: the free foot crosses behind onto the opposite lobe, the skater rises on the skating knee bringing the feet together through the turn, transfers weight to a back outside edge, then extends the free foot forward. Performed on both RFO and LFO.", "description_en": null, "note_en": null, "mandatory_en": "Meet the element definition (otherwise the element scores Bronze).", "performance_example_en": "The skater may approach with skating before performing the element, and may restart or add skating steps between repetitions.", "related_ids": null, "source_page": 39, "confidence": "verbatim-paraphrased", "missing_fields": ["description_en", "note_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 5B", "dance_type": "element"}, "dance_star5b_bo_rolls": {"id": "dance_star5b_bo_rolls", "name": "BO Rolls", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 5"], "definition_en": "Backward outside rolls - short or long curved edges starting on a BO edge with the free leg extended in front; the free foot draws in and steps closely onto the new edge, changing the lean toward the new lobe, the skating knee staying bent and the free foot not passing the skating foot. At least four consecutive rolls, two on each foot.", "description_en": null, "note_en": null, "mandatory_en": "Meet the element definition (otherwise the element scores Bronze).", "performance_example_en": "The skater may approach with skating before performing the element.", "related_ids": null, "source_page": 39, "confidence": "verbatim-paraphrased", "missing_fields": ["description_en", "note_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 5B", "dance_type": "element"}, "dance_star6a_ten_fox": {"id": "dance_star6a_ten_fox", "name": "Ten-Fox", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 6"], "definition_en": "A set-pattern foxtrot combining parts of the old Tenstep and the Foxtrot, generally found easier and more enjoyable than either.", "description_en": "It opens with a three-step progressive in closed hold; on step 4 the follow skates a four-beat back outside swing roll then turns forward to a two-count forward inside edge into open hold, while the lead skates a six-beat forward outside-to-inside change of edge. Progressive sequences, three-turns and open C steps for both partners carry the dance around the rink, with shoulders kept parallel to the tracings and the lead checking rotation after the C step. Soft knee bends, no pushing and attention to the music give the dance its character.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 42, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 6A", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "100 bpm (25 measures of 4 beats)", "pattern": "Set", "inventor": "George Muller", "first_performed": "Philadelphia Skating Club and Humane Society, 1939", "hold": "Closed and open (changes)"}, "focus_areas_en": ["Lead step 4 / follow steps 4a-4b: the lead's RFOI change of edge with full free-leg extension; the follow's LBO swing roll to RFI with the free leg passing close.", "Lead steps 7-8b / follow step 8: LFO, RFO three-turn, LBO with a smooth turn and a clean LBO edge; the follow's RFO with a double knee bend and strong balance.", "Lead steps 13-14 / follow steps 17-18: the open C steps with correct edges and the free foot placed at the instep before the turn."]}, "dance_star6b_european_waltz": {"id": "dance_star6b_european_waltz", "name": "European Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 6"], "definition_en": "A set-pattern waltz skated in closed hold throughout, using cross-roll three-turns and back outside edges with all threes turned on count three ('European Waltz type' threes).", "description_en": "The lead skates a cross-roll three-turn, a back outside edge and a forward outside edge while the follow skates a back outside edge, a three-turn and another back outside edge. Semicircular lobes run along the sides, joined across the ends by larger lobes of three-turns and back outside edges (about four per partner, more on wide ice). The lead's lobe-starting three is a cross roll while the follow's back edge starts as an open stroke; every edge is three beats. Rotation is continuous around a shared axis, reversing at each new lobe, with checking on the turns to prevent over-rotation; erect posture, even free-leg extension and a steady rising-and-falling knee give the waltz flavour.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 46, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 6B", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "135 bpm (45 measures of 3 beats)", "pattern": "Set", "inventor": "Unknown", "first_performed": "Before 1900; exact date and location unknown", "hold": "Closed throughout"}, "focus_areas_en": ["Lead steps 1-2 / follow steps 2-3: the cross-roll three-turn to a back outside edge with proper cross-roll technique and clean unweighting.", "Lead steps 4-5 / follow steps 5-6: the second cross-roll three-turn with correct edges, foot placement and timing.", "Lead steps 12-13 / follow steps 13-14: the three-turn completed on count three with the new foot set down without a wide step."]}, "dance_star6c_fourteenstep": {"id": "dance_star6c_fourteenstep", "name": "Fourteenstep", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 6"], "definition_en": "A set-pattern dance of fourteen steps to a march, skated partnered (or solo/shadow) with timing, edges and hold the focus of assessment.", "description_en": "Steps 1-7 are skated in closed hold (follow backward, lead forward) along the continuous axis: a three-step progressive lobe toward the midline, a four-beat swing roll, then another progressive. Steps 8-14 curve around the ends in offset closed hold (follow now forward); they include chasse, progressive and crossed steps and the lead's open inside C step, returning to closed hold on step 14. Soft knee action and a strong lean give graceful flow so the dance is danced rather than raced.", "note_en": "Step chart and dance pattern diagram appear in the guide on pages 51-52. Suggested introductory steps are listed for lead and follow.", "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 50, "confidence": "verbatim-paraphrased", "missing_fields": ["performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 6C", "dance_type": "pattern", "dance_meta": {"music": "March, 6/8 or 2/4", "tempo": "112 bpm (56 measures of 2 beats, or 28 measures of 4 beats)", "pattern": "Set", "inventor": "Franz Scholler", "first_performed": "Vienna, 1889 (as the Ten Step / Scholler March)", "hold": "Closed; offset closed during steps 8-12"}, "focus_areas_en": ["Step 4 swing roll: lead RFO-SwR and follow LBO-SwR with correct edge and timing, completing a full outside-edge lobe with soft knee action.", "Lead steps 8-9 / follow steps 9-11: correct edges, foot placement and timing with a smooth transition and clear (full cross-behind) foot placement.", "Lead steps 10-12 / follow steps 12-13: correct edges, foot placement and timing with smooth rhythm and easy transitions."]}, "dance_star7a_foxtrot": {"id": "dance_star7a_foxtrot", "name": "Foxtrot", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 7"], "definition_en": "An optional-pattern foxtrot that opens in open hold with shoulders and hips close, mixing cross rolls, three-turns, progressives and a closed C step on deep semicircular lobes.", "description_en": "Step 2 is a crossed-behind chasse and step 4a a cross-rolled three-turn for the lead, after which the partners take closed hold. The follow's C step (step 11) is taken without a free-leg swing - the foot is simply brought down beside the heel, well turned out - on count one. The free foot is always set down close beside the skating foot. The Foxtrot must be danced, not stepped, with soft knee action and flow.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 53, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 7A", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "100 bpm (25 measures of 4 beats)", "pattern": "Optional", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Westminster Ice Rink, London, 1933", "hold": "Open and closed (changes)"}, "focus_areas_en": ["Lead steps 4a-4b / follow steps 4-5: the cross-roll three-turn with smooth weight transfer and soft knee action, finishing on the back outside edge.", "Lead steps 11a-12 / follow steps 8-10: RBO, LBI-Pr, RBO with good edge quality, the RBO held four beats.", "Lead steps 13-14 / follow steps 11-12: well-rounded inside edges and a clean closed C step finishing on a controlled RBO held four beats."]}, "dance_star7b_tango": {"id": "dance_star7b_tango", "name": "Tango", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 7"], "definition_en": "An optional-pattern tango that pairs quick crossed steps on shallow curves with slower rolls on strong curves, finishing with an open-hold promenade.", "description_en": "Each lobe uses a pair of quick cross steps (one crossed in front, one behind, or the reverse) into a four-beat roll during which the couple briefly takes closed hold before returning to outside hold on the other side. A shallow front-crossed rocker, cross rolls and three-turns appear later, and the promenade ends with closed swing C steps (inside for the lead, outside for the follow) held four beats. Very erect carriage, neat footwork and good flow are essential, with the pace kept without obvious pushing.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 56, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 7B", "dance_type": "pattern", "dance_meta": {"music": "Tango, 4/4", "tempo": "108 bpm (27 measures of 4 beats)", "pattern": "Optional", "inventor": "Paul Kreckow and Trudy Harris", "first_performed": "Hammersmith Ice Rink, London, 1932", "hold": "Outside, closed and open (changes)"}, "focus_areas_en": ["Steps 1-6: the crossed-step sequences (cross-front and cross-behind) with neat feet and clear 'down for 2, up for 2' knee action.", "Steps 8-13: the second set of crossed steps with neat feet and the same clear knee action.", "Steps 20-21: the swing closed C step with a symmetrical lobe, no skidding or wide stepping, the free leg passing close on the swing."]}, "dance_star7c_american_waltz": {"id": "dance_star7c_american_waltz", "name": "American Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 7"], "definition_en": "A set-pattern waltz of semicircular lobes skated toward and away from the midline, joined at the ends by six-beat outside swing rolls; its simple steps hide real difficulty because of the rotation involved.", "description_en": "Partners keep their shoulders parallel with the centre of rotation between them rather than whipping around each other, so the rotation stays continuous and even. Every step is held six beats, the free-leg swing comes from the hip without bending the knee, and the swing threes turn on count four ('American Waltz type' threes). A bend of the skating knee on count one marks the major accent and adds a controlled lilt; the dance is characterised by even flow between points of major and minor emphasis.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 60, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 7C", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "100 bpm (66 measures of 3 beats)", "pattern": "Set", "inventor": "Unknown", "first_performed": "Unknown", "hold": "Closed throughout"}, "focus_areas_en": ["Lead steps 1-2 / follow steps 2-3: RFO swing-three to LBO swing roll - a smooth symmetrical turn, no skidding, with soft 'down for 3, up for 3' knees.", "Lead steps 4-5 / follow steps 5-6: LFO swing-three to RBO swing roll with the same symmetry and knee action.", "Steps 12-13: the swing rolls with controlled free-leg motion, symmetrical edge depth and a clean lobe transition with no wide stepping."]}, "dance_star8a_kilian": {"id": "dance_star8a_kilian", "name": "Kilian", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 8"], "definition_en": "An optional-pattern march and a test of close, accurate footwork, unison of rotation and control, skated in Kilian hold throughout on a counterclockwise elliptical pattern.", "description_en": "The lead's hands keep the follow's hands firmly placed to prevent any separation. There are 14 steps to 16 beats, with only steps 3 and 4 as two-beat steps - strong outside edges that must not flatten. Progressive sequences, a cross roll (step 8), a tight cross-behind (step 9), a crossed-in-front open S step and controlled clockwise shoulder rotation carry the dance, with step 14 set close to the heel on a well-bent knee and upright posture.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: at least three of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 63, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 8A", "dance_type": "pattern", "dance_meta": {"music": "March, 2/4 and 4/4", "tempo": "116 bpm (58 measures of 2 beats)", "pattern": "Optional", "inventor": "Karl Schreiter", "first_performed": "Engelmann Ice Rink, Vienna, 1909", "hold": "Kilian throughout"}, "focus_areas_en": ["Steps 3-4: LFO, RFO - deep outside edges held to the end of the beat, free leg extended and turned out, precise 2,2 timing and open-stroke placement.", "Steps 8-11: cross-roll RFO, cross-behind LFI, open S step, RBO, cross-behind LBI - a smooth controlled turn and edges with continuous March-rhythm knee action and a tightly crossed foot."]}, "dance_star8b_rocker_foxtrot": {"id": "dance_star8b_rocker_foxtrot", "name": "Rocker Foxtrot", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 8"], "definition_en": "A set-pattern foxtrot that makes three lobes toward the barrier and two toward the midline along each side, so two sequences complete one circuit.", "description_en": "Steps 1-4 (a crossed-behind chasse and a progressive) are in open hold; the follow's step 5 is a four-beat LFO swing rocker turned on clean outside edges, timed so the follow's knee bend matches the lead's RFO. The couple takes closed hold through the swing rocker, returning to open hold for the rest, with a cross roll (step 8), strong outside edges and outside closed C steps for both partners (steps 11-12) directed toward the barrier. Good knee action, change of lean and flow give it Foxtrot character.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least three of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 66, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 8B", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "104 bpm (26 measures of 4 beats)", "pattern": "Set", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Streatham Ice Rink, London, 1934", "hold": "Open and closed (changes)"}, "focus_areas_en": ["Lead steps 5a-6 / follow steps 5-6: the lead's LFO, RFO, LFO three-turn and the follow's LFO swing rocker to RBO with correct timing and clear knee unweighting.", "Steps 8-10: cross-roll RFO, LFI-Pr, RFO with correct 2,2,2 timing and clean symmetrical Foxtrot lobes.", "Steps 11-13: LFO, closed C step, RBO, cross-front LBI with 2,2,2 timing and the free foot to the heel before the turn, tightly crossed."]}, "dance_star8c_starlight_waltz": {"id": "dance_star8c_starlight_waltz", "name": "Starlight Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 8"], "definition_en": "A set-pattern waltz similar in character to the Viennese Waltz, opening in closed hold with three chasse sequences each ending on a strong outside edge.", "description_en": "A six-beat change of edge and a six-beat swing roll follow; through steps 11-15 the lead skates three three-turns and the follow two, all in closed hold without whipping. Open and closed C steps, swing rolls and a 'chasse / C step' sequence come next, with hold changes through steps 26-28 where the lead turns a three behind the follow; cross rolls appear on steps 27, 28 and 31, and Kilian hold is held from step 29 to 32. The dance ends with the lead's slide chasse against the follow's swing three-turn into closed hold.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: at least three of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 69, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 8C", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "174 bpm (58 measures of 3 beats)", "pattern": "Set", "inventor": "Courtney J.L. Jones and Peri V. Horne", "first_performed": "Queens Ice Rink, London, 1963", "hold": "Closed, open and Kilian (changes)"}, "focus_areas_en": ["Steps 9-10: LFOI to RFO swing roll - a clear outside-to-inside change of edge with clean unweighting and the outside edge held through the swing roll.", "Lead steps 27-29: cross-roll RFO, cross-roll LFO three-turn, RBO - a smooth turn with clear outside edges on the cross rolls.", "Follow steps 19a-23: the open C steps and swing rolls with clean turns and the outside edge held through the swing roll, free foot passing close."]}, "dance_star9a_paso_doble": {"id": "dance_star9a_paso_doble", "name": "Paso Doble", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 9"], "definition_en": "A dramatic, powerful Spanish optional-pattern dance demanding body control and precise footwork, expressed in either bull-fighting or Flamenco style.", "description_en": "Skated mostly in outside and closed hold, it opens with a progressive and two chasse sequences, then unusual slip ('slide') steps (steps 8-9) skated flat with the free foot sliding to full extension, optionally on bent or straight knees. A bold change of edge (step 11) makes a pronounced outward bulge, and a cross-behind open C step follows. The hardest part is the cross-rolling on steps 26-28, needing supple knees at the fast tempo; the overall pattern is roughly elliptical with outward bulges.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 74, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 9A", "dance_type": "pattern", "dance_meta": {"music": "Paso Doble, 2/4", "tempo": "112 bpm (56 measures of 2 beats)", "pattern": "Optional", "inventor": "Reginald J. Wilkie and Daphne B. Wallis", "first_performed": "Westminster Ice Rink, London, 1938", "hold": "Outside and closed (changes)"}, "focus_areas_en": ["Steps 8-12: the slip steps and crossed steps with the free foot passing closely to full extension, even knee action and a clear change of edge.", "Steps 26-28: the cross rolls and exit swing roll with continuous even knee action and clear outside edges on every cross roll."]}, "dance_star9b_blues": {"id": "dance_star9b_blues", "name": "Blues", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 9"], "definition_en": "An optional-pattern blues skated with strong edges and deep knee action; the lead opens with a forward cross roll and the follow with a back cross roll, moving from partial outside to closed hold.", "description_en": "A cross-rolled three-turn (lead, step 4) toward the barrier, a strong four-beat back outside edge for both, and a deep cross roll (step 7) lead into a 'Promenade' double-progressive (steps 8-11) with an unusual 2,1,1,2 timing. A closed S step (steps 12-13) is turned neatly with the new foot under the centre of gravity, followed by a backward cross roll and a final lobe of three steps for the follow and four for the lead; the pattern may retrogress in places.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 79, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 9B", "dance_type": "pattern", "dance_meta": {"music": "Blues, 4/4", "tempo": "88 bpm (22 measures of 4 beats)", "pattern": "Optional", "inventor": "Robert Dench and Lesley Turner", "first_performed": "Streatham Ice Rink, London, 1934", "hold": "Outside, closed and open (changes)"}, "focus_areas_en": ["Steps 5-7: RBO, LFO, cross-roll RFO swing roll with a smooth weight transfer, no flat edges, and the free leg extended through the swing roll.", "Steps 12-14: LFI, closed S step, RBO, cross-roll LBO - a smooth controlled turn with no scraping and soft continuous knee action for the blues character."]}, "dance_star9c_silver_samba": {"id": "dance_star9c_silver_samba", "name": "Silver Samba", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 9"], "definition_en": "An optional-pattern samba opening in Kilian hold with two run sequences, each ending in a 'quick cross-over slip RFI' where the free foot slips behind and across the tracing to accentuate the rhythm.", "description_en": "The follow then turns an open swing three into closed hold while the lead does a slide chasse, leading into a series of Samba-character chasses (some as slide chasses) on a curved pattern. Deep inside swing rolls, more chasses, a lead three-turn into Kilian hold and a triple-swing change of edge follow. The close of the dance is built from inside chasses, slip/slide steps and tucked inside edges with a distinctive 1,1,half,half,1 slip timing. Individual Samba interpretation is allowed as long as the steps, free-leg positions and holds keep their integrity.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 82, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 9C", "dance_type": "pattern", "dance_meta": {"music": "Samba, 2/4", "tempo": "108 bpm (54 measures of 4 beats)", "pattern": "Optional", "inventor": "Courtney J.L. Jones and Peri V. Horne", "first_performed": "Queen's Ice Rink, London, 1963", "hold": "Kilian and closed (changes)"}, "focus_areas_en": ["Steps 14-18: the chasse, quick and swing-roll sequence with neat feet, clear extension, a held inside edge through the swing roll and lively Samba knee action.", "Steps 38-47: the inside chasses and slip steps with deep quick edges, precise timing and full extension on the ice with feet passing close."]}, "dance_star10a_cha_cha_congelado": {"id": "dance_star10a_cha_cha_congelado", "name": "Cha Cha Congelado", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 10"], "definition_en": "An optional-pattern Latin dance meant to be felt in the body as well as the feet, structured to portray a '1, 2 cha-cha-cha' feeling; individual interpretation and pattern retrogressions are permitted.", "description_en": "It opens in outside hold with a lobe and three half-beat slip steps, then moves through hand-in-hand 'touch-down' steps where a brief, decisive weight transfer happens on the 'and' between counts. A rocker (lead) and three-turn (follow), closed hold with a back free-leg extension, a swing closed C step turning the partners back-to-back, and a series of Kilian-hold touch-down steps follow, building to a very deep forward inside edge before the follow's open C step restarts the dance.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 88, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 10A", "dance_type": "pattern", "dance_meta": {"music": "Cha Cha, 4/4", "tempo": "116 bpm (29 measures of 4 beats)", "pattern": "Optional", "inventor": "Bernard Ford, Kelly Johnson, Laurie Palmer and Steven Belanger", "first_performed": "Richmond Hill, Ontario, 1989", "hold": "Outside, hand-in-hand, closed and Kilian (changes)"}, "focus_areas_en": ["Steps 6-9: the touch-down steps with neat feet, soft knees and energetic 'danced' steps, the skating foot tightly crossed below the knee, with correct edges through the rocker (lead) and three-turn (follow).", "Steps 23-25: the swing closed C step with a smooth symmetrical turn, the free leg passing close and tightly crossed for the cross-step."]}, "dance_star10b_westminster_waltz": {"id": "dance_star10b_westminster_waltz", "name": "Westminster Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 10"], "definition_en": "An optional-pattern waltz marked by stately carriage and elegant line, skated with strong edges and softly flowing knees, beginning in Kilian hold and changing to reverse Kilian between steps 5 and 6.", "description_en": "A progressive sequence (with step 3 changing to an inside edge) leads into an inside open C step, after which both partners rotate individually so the lead exits on the follow's right. Cross-behind chasses on a curve lead to the follow's inside forward swing rocker and the lead's outside forward swing counter (step 13), turned in hip-to-hip position with a six-beat swing. Cross rolls, an inside three-turn and a final hold change into Kilian set up the restart, with a one-beat change of edge to RFI to shift the lean.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 93, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 10B", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "162 bpm (54 measures of 3 beats)", "pattern": "Optional", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Westminster Ice Rink, London, 1938", "hold": "Kilian, reverse Kilian, closed and open (changes)"}, "focus_areas_en": ["Steps 1-6: the progressive into the LFI open C step with feet brought together for a quick change of edge and strong, soft-kneed waltz edges throughout.", "Steps 12-14: the cross-behind step into the lead's swing counter and follow's swing rocker, feet tightly crossed and brought together to push into the turn, the free leg extended on the exit edge."]}, "dance_star10c_quickstep": {"id": "dance_star10c_quickstep", "name": "Quickstep", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 10"], "definition_en": "A fast, bright set-pattern dance skated in Kilian hold throughout with both partners on the same steps, requiring the couple to stay hip-to-hip.", "description_en": "It begins approximately on the midline at the end of the rink and needs about the full ice length. A chasse sequence and a progressive lead to a four-beat closed swing S step (step 5) whose exit edge is held three beats with a smooth outward-and-backward free-leg swing for the change of edge. The remaining steps are skated with vitality on deep edges, with a four-beat cross-behind outside edge (step 10), more progressives, a cross roll and a crossed-behind inside-to-outside change of edge.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 98, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 10C", "dance_type": "pattern", "dance_meta": {"music": "Quickstep, 2/4", "tempo": "112 bpm (56 measures of 2 beats)", "pattern": "Set", "inventor": "Reginald J. Wilkie and Daphne B. Wallis", "first_performed": "Westminster Ice Rink, London, 1938", "hold": "Kilian throughout"}, "focus_areas_en": ["Steps 5-6: LFO into a swing closed S step to RBIO - the free leg swung close past the skating foot, instep to heel before the turn, then a side-to-back extension into the RBIO change of edge.", "Steps 13-18: LFO, RFI-Pr, LFO, cross-roll RFO, cross-behind LFIO, cross-front RFI - proper progressive, cross-roll and cross-step technique with light, quick knees and a clear change of edge."]}, "dance_golda_viennese_waltz": {"id": "dance_golda_viennese_waltz", "name": "Viennese Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["Gold"], "definition_en": "A light, lilting optional-pattern waltz on strongly curved edges, needing soft knees, neat feet and elegant carriage.", "description_en": "Its progressive sequences (steps 1-3 and 16-18) are skated in a partial outside hold on evenly rounded lobes, with an unusual 1,1,3,1 timing on steps 1-4 that departs from the usual waltz rhythm. A smooth change of edge (step 5) with the free foot passing close brings the partners to change sides, and a closed S step for the lead against an open C step for the follow (timed 2+1) follows. Hold changes to outside for the cross-roll take-offs, with strong edges, rising knee action and a free-leg swing giving the waltz its character.", "note_en": null, "mandatory_en": "Mandatory (4 of 4 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 101, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "Gold A", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "156 bpm (52 measures of 3 beats)", "pattern": "Optional", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Streatham Ice Rink, London, 1934", "hold": "Closed and outside (changes)"}, "focus_areas_en": ["Steps 1-6: the progressive, cross roll and cross-step into the change of edge with feet brought together, strong edges and soft lilting waltz knees.", "Lead steps 9-10 / follow steps 10-11: the lead's closed S step and follow's open C step with the free foot correctly placed before the turn and good entry/exit balance.", "Steps 16-21: the second progressive, cross roll and cross-step into the change of edge with the same technique and lilting knees."]}, "dance_goldb_argentine_tango": {"id": "dance_goldb_argentine_tango", "name": "Argentine Tango", "code": null, "discipline": "Dance", "track": null, "levels": ["Gold"], "definition_en": "A set-pattern tango skated with strong edges and considerable elan, needing good flow and fast travel without obvious effort.", "description_en": "Open-hold progressive and chasse sequences bring the partners to a bold LFO (step 7), then crossed steps with a change of edge (steps 8-9) and the lead's counter against the follow's cross-behind into closed hold. Cross-roll three-turns (steps 13-15), a Kilian-hold progressive into a swing cross roll, and a passage where the follow performs a forward 'twizzle-like motion' (step 23) while skating hip-to-hip with the lead follow. The dance ends with five cross rolls down the ice (the first held two beats, the rest one each) into a cross-roll swing roll, after which the follow steps briefly to RFI to restart.", "note_en": null, "mandatory_en": "Mandatory (4 of 4 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 106, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "Gold B", "dance_type": "pattern", "dance_meta": {"music": "Tango, 4/4", "tempo": "96 bpm (24 measures of 4 beats)", "pattern": "Set", "inventor": "Reginald J. Wilkie and Daphne B. Wallis", "first_performed": "Westminster Ice Rink, London, 1934", "hold": "Open, closed, Kilian and outside (changes)"}, "focus_areas_en": ["Steps 8-11: the cross-front and cross-behind change of edge and the lead's counter - free foot tightly crossed below the knee, a clear change of edge and lean held two counts, with a clean counter entry and exit.", "Steps 23-24: the lead's swing open S step and follow's twizzle-like turn - the free leg held behind two counts then in front two before the turn on the 'and'.", "Steps 27-31: the five cross rolls with precise technique and timing, each free foot set on a clear edge making distinct rounded lobes."]}, "dance_goldc_rhythm_dance": {"id": "dance_goldc_rhythm_dance", "name": "Gold Rhythm Dance", "code": null, "discipline": "Dance", "track": null, "levels": ["Gold"], "definition_en": "A skater/coach-choreographed rhythm dance to music of designated rhythm(s), combining four required elements with steps and movements that reflect the music's character; it may be skated solo, shadow, or with a partner.", "description_en": "The dance moves in a generally constant direction (looping is allowed to link elements, but not during the step sequence or pattern-dance element) and is developed through skating quality rather than non-skating actions; small hops or jumps up to one rotation are allowed, and stops must stay in character and under five seconds. The four required elements may be skated in any order. Music may mix rhythms (Traditional, Latin, or Additional) arranged pleasingly, but the pattern-dance element must use its corresponding dance rhythm, tempo, and style.", "note_en": "Required-element detail: the Pattern Dance Element is one chosen pattern (Cha Cha Congelado, Silver Samba, Blues, Argentine Tango, Paso Doble, Starlight Waltz, Viennese Waltz, or Westminster Waltz), skated as one full sequence, 100% on time, started on beat one of a phrase. The Step Sequence is a midline, diagonal, or circular sequence of varied steps and turns with no stops or loops. The Sequential Twizzles are two twizzles showing both rotational directions, a minimum of two rotations per foot, at most two steps between. The Dance Spin needs at least three revolutions (variations allowed, up to one foot change).", "mandatory_en": "All four required elements (each assessed as a focus area) and all full-pattern criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 111, "confidence": "verbatim-paraphrased", "missing_fields": ["performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "Gold C", "dance_type": "rhythm_dance", "dance_meta": {"music": "Designated rhythm(s); the pattern-dance element to its required rhythm", "tempo": "Per the chosen pattern dance", "pattern": "Choreographed (optional pattern)", "inventor": null, "first_performed": null, "hold": "Solo, shadow, or with a partner"}, "focus_areas_en": ["Pattern Dance Element - one chosen pattern dance, one full sequence, 100% on time, in the selected rhythm and style.", "Step Sequence - a midline, diagonal, or circular sequence of varied steps and turns with clear edges and no stops or loops.", "Set of Sequential Twizzles - two twizzles showing both directions, minimum two rotations per foot, at most two steps between.", "Dance Spin - at least three revolutions, variations allowed, up to one change of foot."]}, "artistic_chst": {"id": "artistic_chst", "name": "Choreographic Step Sequence", "code": "ChSt", "discipline": "Artistic", "track": null, "levels": ["STAR 5", "STAR 7", "STAR 9", "Gold"], "definition_en": "A sequence focused on musicality and movement that incorporates steps, turns and field moves; pattern must be circular, straight-line or serpentine, clearly visible, covering at least three-quarters of the ice.", "description_en": "The skater performs a choreographic step sequence of varied steps, turns, field moves and body movements, executed to the character of the music, emphasizing quality over difficulty or quantity. Short stops with the music are allowed.", "note_en": null, "mandatory_en": "Must meet the element definition to be assessed Silver or better; otherwise an automatic Bronze.", "performance_example_en": null, "related_ids": null, "source_page": 7, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}}, "artistic_asp": {"id": "artistic_asp", "name": "Artistic Spin", "code": "ASp", "discipline": "Artistic", "track": null, "levels": ["STAR 5", "STAR 7", "STAR 9", "Gold"], "definition_en": "A spin matching the music's character/interpretation and creative in nature; the skater may hold one position or move through several. At least three revolutions are needed to meet the spin definition, and a centre must be clearly established.", "description_en": "The skater performs one creative variation in a basic and/or non-basic spin position to explore creativity while spinning; variations may use arm(s), head and/or leg(s) position to accent the music.", "note_en": "Artistic spins need no minimum revolutions in any one position; the skater may change positions at any pace to reflect the program. An established centre means spinning in roughly the same spot for two to three revolutions (not a travelling, 'loopy' pattern)."
