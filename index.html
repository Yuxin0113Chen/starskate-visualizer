<!DOCTYPE html>
<html lang="en" id="root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STARSkate Visualizer · Interactive test tool</title>
<meta name="description" content="A webtool to review STARSkate test elements, pass criteria and official example videos in one place.">
<meta name="theme-color" content="#f0f8ff">
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;&#9971;&lt;/text&gt;&lt;/svg&gt;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

:root{
  --ice-50:#f0f8ff; --ice-100:#e0f0ff; --ice-200:#baddff; --ice-300:#8ec5f5;
  --accent:#2563eb; --accent-h:#1d4ed8; --accent-l:#eff4ff;
  --ink:#0e1118; --text:#0e1118; --text2:#454f68; --text3:#5e6779;
  --card:#ffffff; --bg:#f0f8ff; --border:#d8e0ea; --border2:#e7edf4;

  /* Official STARSkate discipline colours (from STAR 1–Gold structure chart) */
  --skills:#cfe3c2; --skills-ink:#2f5318; --skills-edge:#a9cd90;
  --freeskate:#d9d2ec; --freeskate-ink:#3c2f63; --freeskate-edge:#b3a6d6;
  --dance:#fbe7a8; --dance-ink:#6b4e0e; --dance-edge:#e8c46b;
  --artistic:#c4d6ee; --artistic-ink:#1f3a63; --artistic-edge:#8fb2da;

  --r:4px;
  --z-nav:20; --z-discnav:25; --z-top:30; --z-panel:40;
  --shadow:0 1px 2px rgba(14,17,24,0.05);
  --shadow-md:0 8px 28px rgba(14,17,24,0.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:300;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;}
:lang(zh-Hans){font-family:'Noto Sans SC','DM Sans',sans-serif;}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r);}

/* Header */
.top{position:sticky;top:0;z-index:var(--z-top);background:rgba(240,248,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding-top:env(safe-area-inset-top);}
.top-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;max-width:1120px;margin:0 auto;}
.logo{font-family:'DM Sans',sans-serif;font-size:1.2rem;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-0.02em;}
.logo span{color:var(--accent);}
.lang-switch{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:3px;}
.lang-btn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 12px;border:none;border-radius:2px;cursor:pointer;background:transparent;color:var(--text3);transition:background .15s,color .15s;min-height:30px;-webkit-tap-highlight-color:transparent;}
.lang-btn.active{background:var(--accent);color:#fff;}
.lang-btn[disabled]{opacity:.45;cursor:not-allowed;}
.prog-switch{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:3px;}
.prog-btn{font-family:inherit;font-size:12px;font-weight:600;padding:5px 13px;border:none;border-radius:2px;cursor:pointer;background:transparent;color:var(--text3);transition:background .15s,color .15s;min-height:30px;-webkit-tap-highlight-color:transparent;}
.prog-btn.active{background:var(--ink);color:#fff;}
.prog-btn[disabled]{opacity:.5;cursor:not-allowed;}

/* Hero */
.hero{padding:42px 0 18px;}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:13px;}
h1{font-family:'DM Sans',sans-serif;font-size:2.35rem;font-weight:700;line-height:1.12;letter-spacing:-0.025em;margin-bottom:16px;text-wrap:balance;max-width:20ch;}
h1 em{font-style:normal;color:var(--accent);}
.hero-lead{font-size:1.02rem;color:var(--text2);max-width:min(640px,100%);margin:0 0 6px;line-height:1.65;text-wrap:pretty;overflow-wrap:break-word;}
.hero-sub{font-size:0.85rem;color:var(--text3);max-width:600px;margin:12px 0 0;line-height:1.6;text-wrap:pretty;}

.search-wrap{max-width:520px;margin:22px 0 0;position:relative;}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:18px;height:18px;}
.search-box{width:100%;font-family:inherit;font-size:0.95rem;font-weight:400;padding:13px 44px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);box-shadow:var(--shadow);transition:border-color .15s;min-height:48px;}
.search-box::placeholder{color:var(--text3);}
.search-box:focus{outline:none;border-color:var(--accent);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:26px;height:26px;border:none;background:var(--ice-100);color:var(--text2);border-radius:999px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:0.9rem;}
.search-clear.show{display:flex;}

/* Discipline tabs */
.disc-nav{position:sticky;top:57px;z-index:var(--z-discnav);background:rgba(240,248,255,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.disc-nav-inner{display:flex;gap:6px;max-width:1120px;margin:0 auto;padding:9px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.disc-nav-inner::-webkit-scrollbar{display:none;}
.disc-tab{flex:0 0 auto;font-family:inherit;font-size:0.84rem;font-weight:600;letter-spacing:0.01em;padding:8px 15px;border:1.5px solid var(--border);border-radius:999px;background:var(--card);color:var(--text2);cursor:pointer;transition:all .14s;min-height:38px;display:inline-flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;}
.disc-tab .disc-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto;}
.disc-dot.skills{background:var(--skills-edge);}
.disc-dot.freeskate{background:var(--freeskate-edge);}
.disc-dot.dance{background:var(--dance-edge);}
.disc-dot.artistic{background:var(--artistic-edge);}
.disc-tab:hover{border-color:var(--text3);}
.disc-tab.active.skills{background:var(--skills);color:var(--skills-ink);border-color:var(--skills-edge);}
.disc-tab.active.freeskate{background:var(--freeskate);color:var(--freeskate-ink);border-color:var(--freeskate-edge);}
.disc-tab.active.dance{background:var(--dance);color:var(--dance-ink);border-color:var(--dance-edge);}
.disc-tab.active.artistic{background:var(--artistic);color:var(--artistic-ink);border-color:var(--artistic-edge);}

/* Level jump-nav */
.level-nav{position:sticky;top:104px;z-index:var(--z-nav);background:rgba(240,248,255,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border2);}
.level-nav-inner{display:flex;gap:5px;max-width:1120px;margin:0 auto;padding:8px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.level-nav-inner::-webkit-scrollbar{display:none;}
.level-chip{flex:0 0 auto;font-family:inherit;font-size:0.76rem;font-weight:600;padding:5px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text2);cursor:pointer;transition:all .12s;min-height:32px;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.level-chip:hover{border-color:var(--accent);color:var(--accent);}

/* Level blocks */
.levels{padding:16px 0 8px;display:flex;flex-direction:column;gap:24px;}
.level{scroll-margin-top:150px;}
.level.hidden{display:none;}
.level-title{display:flex;align-items:baseline;gap:10px;margin:0 2px 11px;}
.level-title .lt-name{font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:-0.01em;color:var(--ink);}
.level-title .lt-count{margin-left:auto;font-size:0.76rem;font-weight:500;color:var(--text3);font-variant-numeric:tabular-nums;}

.level-block{border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);overflow:hidden;box-shadow:var(--shadow);}
.cat-grid{display:grid;gap:0;}
.section{border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:0;}
.sec-head{padding:10px 14px;font-size:0.74rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.sec-head-label{display:inline-flex;align-items:center;min-width:0;}
.sec-head .sec-dot{display:none;}
.d-skills .sec-head{background:var(--skills);color:var(--skills-ink);} .d-skills .sec-dot{background:var(--skills-ink);}
.d-freeskate .sec-head{background:var(--freeskate);color:var(--freeskate-ink);} .d-freeskate .sec-dot{background:var(--freeskate-ink);}
.d-dance .sec-head{background:var(--dance);color:var(--dance-ink);} .d-dance .sec-dot{background:var(--dance-ink);}
.d-artistic .sec-head{background:var(--artistic);color:var(--artistic-ink);} .d-artistic .sec-dot{background:var(--artistic-ink);}

.skill-list{list-style:none;}
.skill-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent;width:100%;text-align:left;border-left:none;border-right:none;border-top:none;background:var(--card);font-family:inherit;min-height:48px;}
.skill-list li:last-child .skill-row{border-bottom:none;}
.skill-row:hover{background:var(--ice-50);}
.d-skills .skill-row:hover{background:color-mix(in srgb,var(--skills) 34%,transparent);}
.d-freeskate .skill-row:hover{background:color-mix(in srgb,var(--freeskate) 34%,transparent);}
.d-dance .skill-row:hover{background:color-mix(in srgb,var(--dance) 30%,transparent);}
.d-artistic .skill-row:hover{background:color-mix(in srgb,var(--artistic) 34%,transparent);}
.skill-row:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
.skill-row.row-hidden{display:none;}
.play-dot{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:2px;background:var(--accent-l);transition:background .12s;}
.d-skills .play-dot{background:color-mix(in srgb,var(--skills) 45%,white);}
.d-freeskate .play-dot{background:color-mix(in srgb,var(--freeskate) 45%,white);}
.d-dance .play-dot{background:color-mix(in srgb,var(--dance) 45%,white);}
.d-artistic .play-dot{background:color-mix(in srgb,var(--artistic) 45%,white);}
.d-skills .play-dot svg path{fill:var(--skills-ink);}
.d-freeskate .play-dot svg path{fill:var(--freeskate-ink);}
.d-dance .play-dot svg path{fill:var(--dance-ink);}
.d-artistic .play-dot svg path{fill:var(--artistic-ink);}
.play-dot svg{width:11px;height:11px;}
.play-dot.no-vid{background:#eef1f6;}
.play-dot.no-vid svg path{fill:#9aa3b5;}
.skill-row.no-play .play-dot{display:none;}
.skill-text{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:3px;}
.skill-en{display:block;font-size:0.88rem;font-weight:500;color:var(--text);line-height:1.3;}
.skill-en mark{background:#fde68a;color:inherit;padding:0 1px;border-radius:2px;}
.skill-sub{display:block;font-size:0.74rem;color:var(--text3);line-height:1.4;}
.skill-code{flex:0 0 auto;font-size:0.68rem;font-weight:600;color:var(--text3);font-variant-numeric:tabular-nums;background:var(--ice-100);padding:2px 7px;border-radius:2px;letter-spacing:0.02em;}

/* "Deferred content" notice (FS-Program: no element rows; level-meta only) */
.deferred-notice{padding:14px 16px;font-size:0.86rem;color:var(--text2);line-height:1.55;background:var(--ice-50);border-bottom:1px solid var(--border2);}
.deferred-notice strong{color:var(--text);font-weight:600;}

/* No results */
.no-results{text-align:center;padding:54px 20px;color:var(--text3);display:none;}
.no-results.show{display:block;}
.no-results-icon{font-size:2.2rem;margin-bottom:12px;}
.no-results-action{margin-top:15px;}
.no-results-action button{font-family:inherit;font-size:0.85rem;font-weight:500;color:#fff;background:var(--accent);border:none;border-radius:var(--r);padding:9px 18px;cursor:pointer;min-height:40px;}

/* Detail panel */
.panel-backdrop{position:fixed;inset:0;background:rgba(14,17,24,0.5);z-index:var(--z-panel);display:none;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .18s;}
@media (min-width:640px){.panel-backdrop{align-items:center;padding:24px;}}
.panel-backdrop.open{display:flex;opacity:1;}
.panel{background:var(--card);width:100%;max-width:600px;max-height:92vh;max-height:92dvh;overflow-y:auto;box-shadow:var(--shadow-md);border-radius:var(--r) var(--r) 0 0;transform:translateY(16px);transition:transform .18s;padding-bottom:env(safe-area-inset-bottom);}
@media (min-width:640px){.panel{border-radius:var(--r);transform:translateY(8px);}}
.panel-backdrop.open .panel{transform:translateY(0);}
.panel-head{position:sticky;top:0;background:var(--card);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 20px 13px;border-bottom:1px solid var(--border);}
.panel-tag{display:inline-block;font-size:0.66rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 9px;border-radius:2px;margin-bottom:9px;}
.panel-tag.skills{background:var(--skills);color:var(--skills-ink);}
.panel-tag.freeskate{background:var(--freeskate);color:var(--freeskate-ink);}
.panel-tag.dance{background:var(--dance);color:var(--dance-ink);}
.panel-tag.artistic{background:var(--artistic);color:var(--artistic-ink);}
.panel-title{font-family:'DM Sans',sans-serif;font-size:1.28rem;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-0.015em;text-wrap:balance;display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;}
.panel-code{font-family:'Space Grotesk',monospace;font-size:0.82rem;font-weight:600;color:var(--accent);background:var(--accent-l);padding:2px 8px;border-radius:3px;letter-spacing:0.02em;}
.panel-subtitle{font-size:0.86rem;color:var(--text3);margin-top:5px;}
.panel-subtitle:empty{display:none;}
.panel-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
.panel-video-link{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:34px;padding:7px 11px;border-radius:var(--r);background:var(--accent);color:#fff;text-decoration:none;font-size:0.82rem;font-weight:700;}
.panel-video-link:hover{background:var(--accent-h);}
.level-video-link{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:28px;padding:4px 11px;border:1px solid rgba(255,255,255,0.82);border-radius:6px;background:#fff;color:var(--accent);text-decoration:none;font-size:0.7rem;font-weight:700;letter-spacing:0;text-transform:none;white-space:nowrap;box-shadow:0 1px 2px rgba(15,23,42,0.12);}
.level-video-link:hover{background:rgba(255,255,255,0.9);}
.panel-close{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r);border:none;background:var(--ice-100);color:var(--text2);font-size:1.05rem;cursor:pointer;}
.panel-close:hover{background:var(--ice-200);}
.panel-body{padding:17px 20px 22px;}
.detail-block{margin-bottom:17px;}
.detail-label{font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.detail-text{font-size:0.94rem;color:var(--text2);line-height:1.62;text-wrap:pretty;}
/* Description renders in a lighter, indented panel under Definition */
.detail-desc{background:var(--ice-50);border-left:3px solid var(--border);padding:11px 14px;border-radius:0 var(--r) var(--r) 0;}
.detail-mand{background:#fff8eb;border:1px solid #f0d49a;border-radius:var(--r);padding:11px 14px;}
.detail-mand .detail-text{color:#5d3f0a;}
/* Recurrence linkbar — small inline strip just above Definition, surfaces
   "Also assessed at STAR X" links when the same element appears in another
   level. Distinct from Related variants disclosure (which is for different
   element names). */
.detail-recurrence{font-size:0.84rem;color:var(--text2);margin:0 0 16px;padding:9px 12px;background:var(--ice-50);border-radius:var(--r);border:1px solid var(--border2);line-height:1.5;}
.detail-recurrence-label{font-size:0.7rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);margin-right:6px;}
.detail-recurrence .related-link{display:inline;padding:0;}
.detail-note{background:#eef6ff;border:1px solid #c9def5;border-radius:var(--r);padding:11px 14px;}
.detail-note .detail-text{color:#1d3a5f;}
/* Performance example collapses by default */
.detail-perf{margin-top:-4px;}
.detail-perf summary{cursor:pointer;list-style:none;padding:7px 0;font-size:0.82rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.detail-perf summary::-webkit-details-marker{display:none;}
.detail-perf summary::before{content:"›";font-size:1.1rem;line-height:1;color:var(--text3);transition:transform .15s;width:14px;text-align:center;}
.detail-perf[open] summary::before{transform:rotate(90deg);}
.detail-perf summary:hover{color:var(--text);}
.detail-perf .detail-text{padding:4px 0 8px 20px;}

.detail-related{margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);}
.detail-related .detail-label{margin-bottom:4px;}
.related-link{display:block;font-size:0.86rem;color:var(--accent);text-decoration:none;padding:6px 0;cursor:pointer;}
.related-link:hover{text-decoration:underline;}
/* Collapsed cross-link disclosure (button-like summary) */
.detail-related-disclosure{margin-top:14px;border-top:1px dashed var(--border);padding-top:6px;}
.detail-related-disclosure summary{list-style:none;cursor:pointer;font-size:0.84rem;font-weight:600;color:var(--accent);padding:7px 0;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.detail-related-disclosure summary::-webkit-details-marker{display:none;}
.detail-related-disclosure summary::before{content:"›";font-size:1.05rem;line-height:1;color:var(--accent);transition:transform .15s;display:inline-block;width:12px;text-align:center;}
.detail-related-disclosure[open] summary::before{transform:rotate(90deg);}
.detail-related-disclosure summary:hover{text-decoration:underline;}
.detail-related-disclosure .detail-related{margin-top:6px;padding-top:0;border-top:none;}

.watch-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);color:#fff;text-decoration:none;font-size:0.95rem;font-weight:600;padding:14px 18px;border-radius:var(--r);min-height:48px;margin-top:6px;}
.watch-btn.secondary{background:var(--card);color:var(--accent);border:1.5px solid var(--accent-l);}
.watch-btn.secondary:hover{background:var(--accent-l);}
.watch-btn svg{width:17px;height:17px;flex:0 0 auto;}
.no-vid-note{font-size:0.82rem;color:var(--text3);line-height:1.55;margin-bottom:10px;text-align:center;text-wrap:pretty;}
.panel-nav{display:flex;gap:8px;margin-top:16px;}
.panel-nav button{flex:1 1 0;font-family:inherit;font-size:0.82rem;font-weight:500;color:var(--text2);background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:9px;cursor:pointer;min-height:42px;}
.panel-nav button:disabled{opacity:0.4;cursor:default;}

.info-banner{background:var(--accent-l);border:1px solid rgba(37,99,235,0.15);border-radius:var(--r);padding:14px 18px;margin:22px 0 8px;font-size:0.85rem;color:var(--text2);line-height:1.6;display:flex;gap:10px;align-items:flex-start;}
footer{padding:34px 20px 56px;color:var(--text3);font-size:0.8rem;line-height:1.6;}

/* Level meta accordion (Honours → Pass order, refined palette) */
.level-meta{margin-top:10px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);overflow:hidden;}
.level-meta summary{list-style:none;cursor:pointer;padding:11px 14px;display:flex;align-items:center;gap:10px;font-size:0.82rem;font-weight:600;color:var(--text2);user-select:none;-webkit-tap-highlight-color:transparent;}
.level-meta summary::-webkit-details-marker{display:none;}
.level-meta summary::before{content:"›";display:inline-block;font-size:1.1rem;line-height:1;color:var(--text3);transition:transform .15s;width:14px;text-align:center;}
.level-meta[open] summary::before{transform:rotate(90deg);}
.level-meta summary:hover{background:var(--ice-50);color:var(--text);}
.level-meta-body{padding:6px 14px 14px;font-size:0.86rem;display:grid;gap:9px;}

/* Video Linker */
.video-linker{margin:18px 0 24px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);box-shadow:var(--shadow);overflow:hidden;}
.video-linker>summary{display:flex;align-items:center;gap:10px;min-height:46px;padding:11px 14px;cursor:pointer;font-weight:700;color:var(--ink);list-style:none;}
.video-linker>summary::-webkit-details-marker{display:none;}
.video-linker>summary::before{content:'+';display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:2px;background:var(--accent-l);color:var(--accent);font-weight:700;}
.video-linker[open]>summary::before{content:'-';}
.video-linker-body{border-top:1px solid var(--border2);padding:14px;display:grid;gap:12px;}
.video-linker-text{font-size:0.9rem;color:var(--text2);line-height:1.55;max-width:760px;}
.video-form{display:grid;grid-template-columns:1.2fr 1fr auto;gap:8px;align-items:end;}
.video-field{display:grid;gap:5px;min-width:0;}
.video-field label{font-size:0.76rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3);}
.video-field input,.video-field textarea{width:100%;font-family:inherit;font-size:0.9rem;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;color:var(--text);padding:9px 10px;min-height:40px;}
.video-field textarea{min-height:104px;resize:vertical;}
.video-actions{display:flex;gap:8px;flex-wrap:wrap;}
.video-btn{font-family:inherit;font-size:0.86rem;font-weight:700;border:1.5px solid var(--accent);border-radius:var(--r);background:var(--accent);color:#fff;min-height:40px;padding:8px 12px;cursor:pointer;}
.video-btn.secondary{background:#fff;color:var(--accent);border-color:var(--accent-l);}
.video-btn:disabled{opacity:.55;cursor:not-allowed;}
.video-status{font-size:0.85rem;color:var(--text2);min-height:22px;}
.video-status strong{color:var(--ink);}
.video-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;}
.video-stat{border:1px solid var(--border2);border-radius:var(--r);padding:9px 10px;background:var(--ice-50);}
.video-stat span{display:block;font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
.video-stat b{font-size:1.05rem;color:var(--ink);}
.video-results{max-height:320px;overflow:auto;border:1px solid var(--border2);border-radius:var(--r);}
.video-results table{width:100%;border-collapse:collapse;font-size:0.84rem;}
.video-results th,.video-results td{padding:8px 9px;border-bottom:1px solid var(--border2);text-align:left;vertical-align:top;}
.video-results th{position:sticky;top:0;background:var(--card);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);z-index:1;}
.video-results a{color:var(--accent);text-decoration:none;}
.video-results a:hover{text-decoration:underline;}
.video-match-pill{display:inline-flex;align-items:center;justify-content:center;min-width:44px;border-radius:999px;padding:2px 7px;background:var(--accent-l);color:var(--accent);font-weight:700;font-size:0.78rem;}
.video-match-pill.low{background:#fff7ed;color:#9a3412;}
.video-list{display:grid;gap:8px;margin:8px 0 0;}
.video-card{display:grid;grid-template-columns:96px 1fr;gap:10px;padding:9px;border:1px solid var(--border2);border-radius:var(--r);background:#fff;text-decoration:none;color:inherit;}
.video-card:hover{border-color:var(--accent-l);background:var(--ice-50);}
.video-card img{width:96px;aspect-ratio:16/9;object-fit:cover;border-radius:2px;background:var(--border2);}
.video-card-title{font-weight:700;font-size:0.88rem;color:var(--ink);line-height:1.3;}
.video-card-meta{display:none;}
.watch-btn.primary{margin-top:8px;}
@media (max-width:760px){.video-form{grid-template-columns:1fr;}.video-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.video-card{grid-template-columns:82px 1fr;}.video-card img{width:82px;}}

 found easier and more enjoyable than either.", "description_en": "It opens with a three-step progressive in closed hold; on step 4 the follow skates a four-beat back outside swing roll then turns forward to a two-count forward inside edge into open hold, while the lead skates a six-beat forward outside-to-inside change of edge. Progressive sequences, three-turns and open C steps for both partners carry the dance around the rink, with shoulders kept parallel to the tracings and the lead checking rotation after the C step. Soft knee bends, no pushing and attention to the music give the dance its character.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 42, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 6A", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "100 bpm (25 measures of 4 beats)", "pattern": "Set", "inventor": "George Muller", "first_performed": "Philadelphia Skating Club and Humane Society, 1939", "hold": "Closed and open (changes)"}, "focus_areas_en": ["Lead step 4 / follow steps 4a-4b: the lead's RFOI change of edge with full free-leg extension; the follow's LBO swing roll to RFI with the free leg passing close.", "Lead steps 7-8b / follow step 8: LFO, RFO three-turn, LBO with a smooth turn and a clean LBO edge; the follow's RFO with a double knee bend and strong balance.", "Lead steps 13-14 / follow steps 17-18: the open C steps with correct edges and the free foot placed at the instep before the turn."]}, {"id": "dance_star6b_european_waltz", "name": "European Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 6"], "definition_en": "A set-pattern waltz skated in closed hold throughout, using cross-roll three-turns and back outside edges with all threes turned on count three ('European Waltz type' threes).", "description_en": "The lead skates a cross-roll three-turn, a back outside edge and a forward outside edge while the follow skates a back outside edge, a three-turn and another back outside edge. Semicircular lobes run along the sides, joined across the ends by larger lobes of three-turns and back outside edges (about four per partner, more on wide ice). The lead's lobe-starting three is a cross roll while the follow's back edge starts as an open stroke; every edge is three beats. Rotation is continuous around a shared axis, reversing at each new lobe, with checking on the turns to prevent over-rotation; erect posture, even free-leg extension and a steady rising-and-falling knee give the waltz flavour.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 46, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 6B", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "135 bpm (45 measures of 3 beats)", "pattern": "Set", "inventor": "Unknown", "first_performed": "Before 1900; exact date and location unknown", "hold": "Closed throughout"}, "focus_areas_en": ["Lead steps 1-2 / follow steps 2-3: the cross-roll three-turn to a back outside edge with proper cross-roll technique and clean unweighting.", "Lead steps 4-5 / follow steps 5-6: the second cross-roll three-turn with correct edges, foot placement and timing.", "Lead steps 12-13 / follow steps 13-14: the three-turn completed on count three with the new foot set down without a wide step."]}, {"id": "dance_star6c_fourteenstep", "name": "Fourteenstep", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 6"], "definition_en": "A set-pattern dance of fourteen steps to a march, skated partnered (or solo/shadow) with timing, edges and hold the focus of assessment.", "description_en": "Steps 1-7 are skated in closed hold (follow backward, lead forward) along the continuous axis: a three-step progressive lobe toward the midline, a four-beat swing roll, then another progressive. Steps 8-14 curve around the ends in offset closed hold (follow now forward); they include chasse, progressive and crossed steps and the lead's open inside C step, returning to closed hold on step 14. Soft knee action and a strong lean give graceful flow so the dance is danced rather than raced.", "note_en": "Step chart and dance pattern diagram appear in the guide on pages 51-52. Suggested introductory steps are listed for lead and follow.", "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 50, "confidence": "verbatim-paraphrased", "missing_fields": ["performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 6C", "dance_type": "pattern", "dance_meta": {"music": "March, 6/8 or 2/4", "tempo": "112 bpm (56 measures of 2 beats, or 28 measures of 4 beats)", "pattern": "Set", "inventor": "Franz Scholler", "first_performed": "Vienna, 1889 (as the Ten Step / Scholler March)", "hold": "Closed; offset closed during steps 8-12"}, "focus_areas_en": ["Step 4 swing roll: lead RFO-SwR and follow LBO-SwR with correct edge and timing, completing a full outside-edge lobe with soft knee action.", "Lead steps 8-9 / follow steps 9-11: correct edges, foot placement and timing with a smooth transition and clear (full cross-behind) foot placement.", "Lead steps 10-12 / follow steps 12-13: correct edges, foot placement and timing with smooth rhythm and easy transitions."]}], "STAR 7": [{"id": "dance_star7a_foxtrot", "name": "Foxtrot", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 7"], "definition_en": "An optional-pattern foxtrot that opens in open hold with shoulders and hips close, mixing cross rolls, three-turns, progressives and a closed C step on deep semicircular lobes.", "description_en": "Step 2 is a crossed-behind chasse and step 4a a cross-rolled three-turn for the lead, after which the partners take closed hold. The follow's C step (step 11) is taken without a free-leg swing - the foot is simply brought down beside the heel, well turned out - on count one. The free foot is always set down close beside the skating foot. The Foxtrot must be danced, not stepped, with soft knee action and flow.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 53, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 7A", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "100 bpm (25 measures of 4 beats)", "pattern": "Optional", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Westminster Ice Rink, London, 1933", "hold": "Open and closed (changes)"}, "focus_areas_en": ["Lead steps 4a-4b / follow steps 4-5: the cross-roll three-turn with smooth weight transfer and soft knee action, finishing on the back outside edge.", "Lead steps 11a-12 / follow steps 8-10: RBO, LBI-Pr, RBO with good edge quality, the RBO held four beats.", "Lead steps 13-14 / follow steps 11-12: well-rounded inside edges and a clean closed C step finishing on a controlled RBO held four beats."]}, {"id": "dance_star7b_tango", "name": "Tango", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 7"], "definition_en": "An optional-pattern tango that pairs quick crossed steps on shallow curves with slower rolls on strong curves, finishing with an open-hold promenade.", "description_en": "Each lobe uses a pair of quick cross steps (one crossed in front, one behind, or the reverse) into a four-beat roll during which the couple briefly takes closed hold before returning to outside hold on the other side. A shallow front-crossed rocker, cross rolls and three-turns appear later, and the promenade ends with closed swing C steps (inside for the lead, outside for the follow) held four beats. Very erect carriage, neat footwork and good flow are essential, with the pace kept without obvious pushing.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 56, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 7B", "dance_type": "pattern", "dance_meta": {"music": "Tango, 4/4", "tempo": "108 bpm (27 measures of 4 beats)", "pattern": "Optional", "inventor": "Paul Kreckow and Trudy Harris", "first_performed": "Hammersmith Ice Rink, London, 1932", "hold": "Outside, closed and open (changes)"}, "focus_areas_en": ["Steps 1-6: the crossed-step sequences (cross-front and cross-behind) with neat feet and clear 'down for 2, up for 2' knee action.", "Steps 8-13: the second set of crossed steps with neat feet and the same clear knee action.", "Steps 20-21: the swing closed C step with a symmetrical lobe, no skidding or wide stepping, the free leg passing close on the swing."]}, {"id": "dance_star7c_american_waltz", "name": "American Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 7"], "definition_en": "A set-pattern waltz of semicircular lobes skated toward and away from the midline, joined at the ends by six-beat outside swing rolls; its simple steps hide real difficulty because of the rotation involved.", "description_en": "Partners keep their shoulders parallel with the centre of rotation between them rather than whipping around each other, so the rotation stays continuous and even. Every step is held six beats, the free-leg swing comes from the hip without bending the knee, and the swing threes turn on count four ('American Waltz type' threes). A bend of the skating knee on count one marks the major accent and adds a controlled lilt; the dance is characterised by even flow between points of major and minor emphasis.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least two of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 60, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 7C", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "100 bpm (66 measures of 3 beats)", "pattern": "Set", "inventor": "Unknown", "first_performed": "Unknown", "hold": "Closed throughout"}, "focus_areas_en": ["Lead steps 1-2 / follow steps 2-3: RFO swing-three to LBO swing roll - a smooth symmetrical turn, no skidding, with soft 'down for 3, up for 3' knees.", "Lead steps 4-5 / follow steps 5-6: LFO swing-three to RBO swing roll with the same symmetry and knee action.", "Steps 12-13: the swing rolls with controlled free-leg motion, symmetrical edge depth and a clean lobe transition with no wide stepping."]}], "STAR 8": [{"id": "dance_star8a_kilian", "name": "Kilian", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 8"], "definition_en": "An optional-pattern march and a test of close, accurate footwork, unison of rotation and control, skated in Kilian hold throughout on a counterclockwise elliptical pattern.", "description_en": "The lead's hands keep the follow's hands firmly placed to prevent any separation. There are 14 steps to 16 beats, with only steps 3 and 4 as two-beat steps - strong outside edges that must not flatten. Progressive sequences, a cross roll (step 8), a tight cross-behind (step 9), a crossed-in-front open S step and controlled clockwise shoulder rotation carry the dance, with step 14 set close to the heel on a well-bent knee and upright posture.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: at least three of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 63, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 8A", "dance_type": "pattern", "dance_meta": {"music": "March, 2/4 and 4/4", "tempo": "116 bpm (58 measures of 2 beats)", "pattern": "Optional", "inventor": "Karl Schreiter", "first_performed": "Engelmann Ice Rink, Vienna, 1909", "hold": "Kilian throughout"}, "focus_areas_en": ["Steps 3-4: LFO, RFO - deep outside edges held to the end of the beat, free leg extended and turned out, precise 2,2 timing and open-stroke placement.", "Steps 8-11: cross-roll RFO, cross-behind LFI, open S step, RBO, cross-behind LBI - a smooth controlled turn and edges with continuous March-rhythm knee action and a tightly crossed foot."]}, {"id": "dance_star8b_rocker_foxtrot", "name": "Rocker Foxtrot", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 8"], "definition_en": "A set-pattern foxtrot that makes three lobes toward the barrier and two toward the midline along each side, so two sequences complete one circuit.", "description_en": "Steps 1-4 (a crossed-behind chasse and a progressive) are in open hold; the follow's step 5 is a four-beat LFO swing rocker turned on clean outside edges, timed so the follow's knee bend matches the lead's RFO. The couple takes closed hold through the swing rocker, returning to open hold for the rest, with a cross roll (step 8), strong outside edges and outside closed C steps for both partners (steps 11-12) directed toward the barrier. Good knee action, change of lean and flow give it Foxtrot character.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted; at least two of three focus areas successful. Full pattern: at least three of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 66, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 8B", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "104 bpm (26 measures of 4 beats)", "pattern": "Set", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Streatham Ice Rink, London, 1934", "hold": "Open and closed (changes)"}, "focus_areas_en": ["Lead steps 5a-6 / follow steps 5-6: the lead's LFO, RFO, LFO three-turn and the follow's LFO swing rocker to RBO with correct timing and clear knee unweighting.", "Steps 8-10: cross-roll RFO, LFI-Pr, RFO with correct 2,2,2 timing and clean symmetrical Foxtrot lobes.", "Steps 11-13: LFO, closed C step, RBO, cross-front LBI with 2,2,2 timing and the free foot to the heel before the turn, tightly crossed."]}, {"id": "dance_star8c_starlight_waltz", "name": "Starlight Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 8"], "definition_en": "A set-pattern waltz similar in character to the Viennese Waltz, opening in closed hold with three chasse sequences each ending on a strong outside edge.", "description_en": "A six-beat change of edge and a six-beat swing roll follow; through steps 11-15 the lead skates three three-turns and the follow two, all in closed hold without whipping. Open and closed C steps, swing rolls and a 'chasse / C step' sequence come next, with hold changes through steps 26-28 where the lead turns a three behind the follow; cross rolls appear on steps 27, 28 and 31, and Kilian hold is held from step 29 to 32. The dance ends with the lead's slide chasse against the follow's swing three-turn into closed hold.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: at least three of four criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 69, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 8C", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "174 bpm (58 measures of 3 beats)", "pattern": "Set", "inventor": "Courtney J.L. Jones and Peri V. Horne", "first_performed": "Queens Ice Rink, London, 1963", "hold": "Closed, open and Kilian (changes)"}, "focus_areas_en": ["Steps 9-10: LFOI to RFO swing roll - a clear outside-to-inside change of edge with clean unweighting and the outside edge held through the swing roll.", "Lead steps 27-29: cross-roll RFO, cross-roll LFO three-turn, RBO - a smooth turn with clear outside edges on the cross rolls.", "Follow steps 19a-23: the open C steps and swing rolls with clean turns and the outside edge held through the swing roll, free foot passing close."]}], "STAR 9": [{"id": "dance_star9a_paso_doble", "name": "Paso Doble", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 9"], "definition_en": "A dramatic, powerful Spanish optional-pattern dance demanding body control and precise footwork, expressed in either bull-fighting or Flamenco style.", "description_en": "Skated mostly in outside and closed hold, it opens with a progressive and two chasse sequences, then unusual slip ('slide') steps (steps 8-9) skated flat with the free foot sliding to full extension, optionally on bent or straight knees. A bold change of edge (step 11) makes a pronounced outward bulge, and a cross-behind open C step follows. The hardest part is the cross-rolling on steps 26-28, needing supple knees at the fast tempo; the overall pattern is roughly elliptical with outward bulges.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 74, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 9A", "dance_type": "pattern", "dance_meta": {"music": "Paso Doble, 2/4", "tempo": "112 bpm (56 measures of 2 beats)", "pattern": "Optional", "inventor": "Reginald J. Wilkie and Daphne B. Wallis", "first_performed": "Westminster Ice Rink, London, 1938", "hold": "Outside and closed (changes)"}, "focus_areas_en": ["Steps 8-12: the slip steps and crossed steps with the free foot passing closely to full extension, even knee action and a clear change of edge.", "Steps 26-28: the cross rolls and exit swing roll with continuous even knee action and clear outside edges on every cross roll."]}, {"id": "dance_star9b_blues", "name": "Blues", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 9"], "definition_en": "An optional-pattern blues skated with strong edges and deep knee action; the lead opens with a forward cross roll and the follow with a back cross roll, moving from partial outside to closed hold.", "description_en": "A cross-rolled three-turn (lead, step 4) toward the barrier, a strong four-beat back outside edge for both, and a deep cross roll (step 7) lead into a 'Promenade' double-progressive (steps 8-11) with an unusual 2,1,1,2 timing. A closed S step (steps 12-13) is turned neatly with the new foot under the centre of gravity, followed by a backward cross roll and a final lobe of three steps for the follow and four for the lead; the pattern may retrogress in places.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 79, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 9B", "dance_type": "pattern", "dance_meta": {"music": "Blues, 4/4", "tempo": "88 bpm (22 measures of 4 beats)", "pattern": "Optional", "inventor": "Robert Dench and Lesley Turner", "first_performed": "Streatham Ice Rink, London, 1934", "hold": "Outside, closed and open (changes)"}, "focus_areas_en": ["Steps 5-7: RBO, LFO, cross-roll RFO swing roll with a smooth weight transfer, no flat edges, and the free leg extended through the swing roll.", "Steps 12-14: LFI, closed S step, RBO, cross-roll LBO - a smooth controlled turn with no scraping and soft continuous knee action for the blues character."]}, {"id": "dance_star9c_silver_samba", "name": "Silver Samba", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 9"], "definition_en": "An optional-pattern samba opening in Kilian hold with two run sequences, each ending in a 'quick cross-over slip RFI' where the free foot slips behind and across the tracing to accentuate the rhythm.", "description_en": "The follow then turns an open swing three into closed hold while the lead does a slide chasse, leading into a series of Samba-character chasses (some as slide chasses) on a curved pattern. Deep inside swing rolls, more chasses, a lead three-turn into Kilian hold and a triple-swing change of edge follow. The close of the dance is built from inside chasses, slip/slide steps and tucked inside edges with a distinctive 1,1,half,half,1 slip timing. Individual Samba interpretation is allowed as long as the steps, free-leg positions and holds keep their integrity.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 82, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 9C", "dance_type": "pattern", "dance_meta": {"music": "Samba, 2/4", "tempo": "108 bpm (54 measures of 4 beats)", "pattern": "Optional", "inventor": "Courtney J.L. Jones and Peri V. Horne", "first_performed": "Queen's Ice Rink, London, 1963", "hold": "Kilian and closed (changes)"}, "focus_areas_en": ["Steps 14-18: the chasse, quick and swing-roll sequence with neat feet, clear extension, a held inside edge through the swing roll and lively Samba knee action.", "Steps 38-47: the inside chasses and slip steps with deep quick edges, precise timing and full extension on the ice with feet passing close."]}], "STAR 10": [{"id": "dance_star10a_cha_cha_congelado", "name": "Cha Cha Congelado", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 10"], "definition_en": "An optional-pattern Latin dance meant to be felt in the body as well as the feet, structured to portray a '1, 2 cha-cha-cha' feeling; individual interpretation and pattern retrogressions are permitted.", "description_en": "It opens in outside hold with a lobe and three half-beat slip steps, then moves through hand-in-hand 'touch-down' steps where a brief, decisive weight transfer happens on the 'and' between counts. A rocker (lead) and three-turn (follow), closed hold with a back free-leg extension, a swing closed C step turning the partners back-to-back, and a series of Kilian-hold touch-down steps follow, building to a very deep forward inside edge before the follow's open C step restarts the dance.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 88, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 10A", "dance_type": "pattern", "dance_meta": {"music": "Cha Cha, 4/4", "tempo": "116 bpm (29 measures of 4 beats)", "pattern": "Optional", "inventor": "Bernard Ford, Kelly Johnson, Laurie Palmer and Steven Belanger", "first_performed": "Richmond Hill, Ontario, 1989", "hold": "Outside, hand-in-hand, closed and Kilian (changes)"}, "focus_areas_en": ["Steps 6-9: the touch-down steps with neat feet, soft knees and energetic 'danced' steps, the skating foot tightly crossed below the knee, with correct edges through the rocker (lead) and three-turn (follow).", "Steps 23-25: the swing closed C step with a smooth symmetrical turn, the free leg passing close and tightly crossed for the cross-step."]}, {"id": "dance_star10b_westminster_waltz", "name": "Westminster Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 10"], "definition_en": "An optional-pattern waltz marked by stately carriage and elegant line, skated with strong edges and softly flowing knees, beginning in Kilian hold and changing to reverse Kilian between steps 5 and 6.", "description_en": "A progressive sequence (with step 3 changing to an inside edge) leads into an inside open C step, after which both partners rotate individually so the lead exits on the follow's right. Cross-behind chasses on a curve lead to the follow's inside forward swing rocker and the lead's outside forward swing counter (step 13), turned in hip-to-hip position with a six-beat swing. Cross rolls, an inside three-turn and a final hold change into Kilian set up the restart, with a one-beat change of edge to RFI to shift the lean.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 93, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 10B", "dance_type": "pattern", "dance_meta": {"music": "Waltz, 3/4", "tempo": "162 bpm (54 measures of 3 beats)", "pattern": "Optional", "inventor": "Eric van der Weyden and Eva Keats", "first_performed": "Westminster Ice Rink, London, 1938", "hold": "Kilian, reverse Kilian, closed and open (changes)"}, "focus_areas_en": ["Steps 1-6: the progressive into the LFI open C step with feet brought together for a quick change of edge and strong, soft-kneed waltz edges throughout.", "Steps 12-14: the cross-behind step into the lead's swing counter and follow's swing rocker, feet tightly crossed and brought together to push into the turn, the free leg extended on the exit edge."]}, {"id": "dance_star10c_quickstep", "name": "Quickstep", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 10"], "definition_en": "A fast, bright set-pattern dance skated in Kilian hold throughout with both partners on the same steps, requiring the couple to stay hip-to-hip.", "description_en": "It begins approximately on the midline at the end of the rink and needs about the full ice length. A chasse sequence and a progressive lead to a four-beat closed swing S step (step 5) whose exit edge is held three beats with a smooth outward-and-backward free-leg swing for the change of edge. The remaining steps are skated with vitality on deep edges, with a four-beat cross-behind outside edge (step 10), more progressives, a cross roll and a crossed-behind inside-to-outside change of edge.", "note_en": null, "mandatory_en": "Mandatory (3 of 3 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 98, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 10C", "dance_type": "pattern", "dance_meta": {"music": "Quickstep, 2/4", "tempo": "112 bpm (56 measures of 2 beats)", "pattern": "Set", "inventor": "Reginald J. Wilkie and Daphne B. Wallis", "first_performed": "Westminster Ice Rink, London, 1938", "hold": "Kilian throughout"}, "focus_areas_en": ["Steps 5-6: LFO into a swing closed S step to RBIO  and cross-step into the change of edge with feet brought together, strong edges and soft lilting waltz knees.", "Lead steps 9-10 / follow steps 10-11: the lead's closed S step and follow's open C step with the free foot correctly placed before the turn and good entry/exit balance.", "Steps 16-21: the second progressive, cross roll and cross-step into the change of edge with the same technique and lilting knees."]}, {"id": "dance_goldb_argentine_tango", "name": "Argentine Tango", "code": null, "discipline": "Dance", "track": null, "levels": ["Gold"], "definition_en": "A set-pattern tango skated with strong edges and considerable elan, needing good flow and fast travel without obvious effort.", "description_en": "Open-hold progressive and chasse sequences bring the partners to a bold LFO (step 7), then crossed steps with a change of edge (steps 8-9) and the lead's counter against the follow's cross-behind into closed hold. Cross-roll three-turns (steps 13-15), a Kilian-hold progressive into a swing cross roll, and a passage where the follow performs a forward 'twizzle-like motion' (step 23) while skating hip-to-hip with the lead follow. The dance ends with five cross rolls down the ice (the first held two beats, the rest one each) into a cross-roll swing roll, after which the follow steps briefly to RFI to restart.", "note_en": null, "mandatory_en": "Mandatory (4 of 4 successful): correct timing throughout (one timing error permitted) and all focus areas successful. Full pattern: all four criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 106, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "Gold B", "dance_type": "pattern", "dance_meta": {"music": "Tango, 4/4", "tempo": "96 bpm (24 measures of 4 beats)", "pattern": "Set", "inventor": "Reginald J. Wilkie and Daphne B. Wallis", "first_performed": "Westminster Ice Rink, London, 1934", "hold": "Open, closed, Kilian and outside (changes)"}, "focus_areas_en": ["Steps 8-11: the cross-front and cross-behind change of edge and the lead's counter - free foot tightly crossed below the knee, a clear change of edge and lean held two counts, with a clean counter entry and exit.", "Steps 23-24: the lead's swing open S step and follow's twizzle-like turn - the free leg held behind two counts then in front two before the turn on the 'and'.", "Steps 27-31: the five cross rolls with precise technique and timing, each free foot set on a clear edge making distinct rounded lobes."]}, {"id": "dance_goldc_rhythm_dance", "name": "Gold Rhythm Dance", "code": null, "discipline": "Dance", "track": null, "levels": ["Gold"], "definition_en": "A skater/coach-choreographed rhythm dance to music of designated rhythm(s), combining four required elements with steps and movements that reflect the music's character; it may be skated solo, shadow, or with a partner.", "description_en": "The dance moves in a generally constant direction (looping is allowed to link elements, but not during the step sequence or pattern-dance element) and is developed through skating quality rather than non-skating actions; small hops or jumps up to one rotation are allowed, and stops must stay in character and under five seconds. The four required elements may be skated in any order. Music may mix rhythms (Traditional, Latin, or Additional) arranged pleasingly, but the pattern-dance element must use its corresponding dance rhythm, tempo, and style.", "note_en": "Required-element detail: the Pattern Dance Element is one chosen pattern (Cha Cha Congelado, Silver Samba, Blues, Argentine Tango, Paso Doble, Starlight Waltz, Viennese Waltz, or Westminster Waltz), skated as one full sequence, 100% on time, started on beat one of a phrase. The Step Sequence is a midline, diagonal, or circular sequence of varied steps and turns with no stops or loops. The Sequential Twizzles are two twizzles showing both rotational directions, a minimum of two rotations per foot, at most two steps between. The Dance Spin needs at least three revolutions (variations allowed, up to one foot change).", "mandatory_en": "All four required elements (each assessed as a focus area) and all full-pattern criteria must be at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 111, "confidence": "verbatim-paraphrased", "missing_fields": ["performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "Gold C", "dance_type": "rhythm_dance", "dance_meta": {"music": "Designated rhythm(s); the pattern-dance element to its required rhythm", "tempo": "Per the chosen pattern dance", "pattern": "Choreographed (optional pattern)", "inventor": null, "first_performed": null, "hold": "Solo, shadow, or with a partner"}, "focus_areas_en": ["Pattern Dance Element - one chosen pattern dance, one full sequence, 100% on time, in the selected rhythm and style.", "Step Sequence - a midline, diagonal, or circular sequence of varied steps and turns with clear edges and no stops or loops.", "Set of Sequential Twizzles - two twizzles showing both directions, minimum two rotations per foot, at most two steps between.", "Dance Spin - at least three revolutions, variations allowed, up to one change of foot."]}]}, "artistic": {"STAR 5": [{"id": "artistic_chst", "name": "Choreographic Step Sequence", "code": "ChSt", "discipline": "Artistic", "track": null, "levels": ["STAR 5", "STAR 7", "STAR 9", "Gold"], "definition_en": "A sequence focused on musicality and movement that incorporates steps, turns and field moves; pattern must be circular, straight-line or serpentine, clearly visible, covering at least three-quarters of the ice.", "description_en": "The skater performs a choreographic step sequence of varied steps, turns, field moves and body movements, executed to the character 24, "confidence": "verbatim-paraphrased", "missing_fields": ["description_en", "note_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 3B", "dance_type": "element"}, "dance_star4a_swing_dance": {"id": "dance_star4a_swing_dance", "name": "Swing Dance", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 4"], "definition_en": "A beginner dance using all the basic forward and backward edges, giving a relaxed way to change between skating forward and backward; both partners skate identical steps, though not at the same time.", "description_en": "Skated mostly in closed hold down the length of the rink, it has four lobes per side - whoever skates forward on one side skates backward on the other. Chasse sequences (an outside edge, an inside edge, then a two-beat outside edge with a slight change of edge) apply both forward and backward, and two lobes per straightaway are four-beat swing rolls in each direction. Each end has a seven-step sequence held two beats per step ending in a four-beat swing roll; partners take hand-in-hand hold at the ends so both can skate forward, and a forward inside open C step is required. The dance should look relaxed and fun with soft knee action.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted (no more than four steps off in a sequence); at least two of three focus areas successful. Full pattern: at least two of three criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 27, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 4A", "dance_type": "pattern", "dance_meta": {"music": "Foxtrot, 4/4", "tempo": "96 bpm (24 measures of 4 beats)", "pattern": "Set", "inventor": "Hubert Sprott", "first_performed": "Unknown", "hold": "Closed (hand-in-hand at the ends)"}, "focus_areas_en": ["Steps 1-6 and 16-21: the forward and backward chasse sequences with strong curves in both directions and solid chasse technique.", "Lead steps 22-23 / follow steps 7-8: backward swing rolls (RBO, LBO) with proper backward pushes, knee action and strong curves.", "Lead steps 11-13 / follow steps 26-28: LFO, RFI-Pr, LBI - a solid open C step with good free-leg extension and neat feet."]}, "dance_star4b_fiesta_tango": {"id": "dance_star4b_fiesta_tango", "name": "Fiesta Tango", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 4"], "definition_en": "A slow set-pattern tango that starts in reverse Kilian hold, switches to Kilian hold for the open C step at steps 10-11, and returns to reverse Kilian as the partners change from backward to forward at step 16.", "description_en": "Partners aim for upright carriage, soft knees, easy flow and smooth leg swings. Step 8 allows expressive interpretation: a well-bent skating knee, the free leg swinging forward, a change of edge on the full swing at the end of count four, then the free leg swinging back - though the change of edge must fall on the correct beat. The steps allow easy, rhythmical movement in a pleasing tango style.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted (no more than four steps off in a sequence); at least two of three focus areas successful. Full pattern: at least two of three criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 32, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STAR 4B", "dance_type": "pattern", "dance_meta": {"music": "Tango, 4/4", "tempo": "108 bpm (27 measures of 4 beats)", "pattern": "Set", "inventor": "George Muller", "first_performed": "Colorado Springs, 1948", "hold": "Reverse Kilian, changing to Kilian"}, "focus_areas_en": ["Steps 5-7: LFO, cross-roll RFO, cross-behind LFI - a proper cross roll with an outside-to-outside lobe change and a tight, neat cross behind.", "Step 8: the RFOI swing roll - free leg behind two beats then forward two, then a change of edge held two beats with the free leg externally rotated.", "Steps 10-12: RFI, LBI, RBO - a solid open C step with neat feet and a stable BO edge with good knee bend and front extension."]}, "dance_star5a_willow_waltz": {"id": "dance_star5a_willow_waltz", "name": "Willow Waltz", "code": null, "discipline": "Dance", "track": null, "levels": ["STAR 5"], "definition_en": "A set-pattern waltz skated entirely in closed hold; carriage, timing and clean footwork are the focus rather than difficulty.", "description_en": "An upright carriage and steady waltz rhythm are held throughout, partners staying close with neat feet and easy flow rather than visible pushing. Steps 1-2 are chasses; the lead's steps 5-6 form an inside open C step (a three-beat RFI into a three-beat LBI). The follow's step 8 is a three-turn on beat three; steps 9-11 are a progressive, then a chasse on 12-13. The lead's step 14 is a three-turn on beat three (not a cross-roll take-off). The follow's steps 18-19 form an inside open C step held three beats each, and steps 20-22 are a progressive for both partners.", "note_en": null, "mandatory_en": "Mandatory (3 of 4 successful, including timing): correct timing throughout, one timing error permitted (no more than four steps off in a sequence); at least two of three focus areas successful. Full pattern: at least two of three criteria at Silver or better.", "performance_example_en": null, "related_ids": null, "source_page": 35, "confidence": "verbatim-paraphrased", "missing_fields": ["note_en", "performance_example_en"], "_zh": {"definition": null, "description": null, "note": null, "mandatory": null}, "test": "STA
